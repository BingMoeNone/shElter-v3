<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理</title>
    <style>
        /* Wiki Platform V3 统一样式 */
        :root {
            --color-primary: #0D8ABC;
            --color-primary-dark: #096a8f;
            --color-primary-light: #3498db;
            --color-secondary: #9b59b6;
            --color-accent: #ff6b6b;
            --color-success: #27ae60;
            --color-danger: #e74c3c;
            --color-warning: #f39c12;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-background: #121212;
            --color-surface: #1a1a1a;
            --color-surface-hover: #2a2a2a;
            --color-border: #333333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif; background-color: var(--color-background); color: var(--color-text); line-height: 1.6; }
        header { background: var(--color-surface); padding: 15px 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { color: var(--color-text); text-decoration: none; padding: 8px 15px; border-radius: 4px; transition: all 0.3s ease; }
        nav a:hover, nav a.active { background: var(--color-primary); color: #000; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .page-title { font-size: 2rem; color: var(--color-primary); margin-bottom: 20px; text-align: center; }
        .search-bar input { width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--color-border); border-radius: 4px; color: var(--color-text); font-size: 1rem; }
        .search-bar input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 10px rgba(0,255,157,0.2); }
        .loading { text-align: center; font-size: 1.2rem; color: var(--color-text-muted); padding: 40px; }
        .articles-table { width: 100%; border-collapse: collapse; background: var(--color-surface); border-radius: 8px; overflow: hidden; }
        .articles-table th, .articles-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--color-border); }
        .articles-table th { background: rgba(0,255,157,0.1); color: var(--color-primary); font-weight: bold; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-published { background: rgba(67,233,123,0.2); color: #43e97b; }
        .status-draft { background: rgba(255,204,0,0.2); color: #ffcc00; }
        .btn { padding: 6px 12px; border: 1px solid var(--color-border); border-radius: 4px; font-size: 0.8rem; cursor: pointer; }
        .btn-edit { background: rgba(0,255,157,0.1); color: var(--color-primary); }
        .btn-delete { background: rgba(255,107,107,0.1); color: #ff6b6b; }
    </style>
</head>
<body>
    <header>
        <h1>管理后台</h1>
        <nav>
            <ul>
                <li><a href="admin-dashboard.html">仪表盘</a></li>
                <li><a href="admin-articles.html" class="active">文章管理</a></li>
                <li><a href="admin-users.html">用户管理</a></li>
                <li><a href="admin-comments.html">评论管理</a></li>
                <li><a href="admin-moderation.html">内容审核</a></li>
                <li><a href="index.html">返回首页</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1 class="page-title">文章管理</h1>
        <div class="search-bar">
            <input type="text" id="searchQuery" placeholder="搜索文章标题..." />
        </div>
        <div id="loading" class="loading">加载中...</div>
        <div id="articlesTableContainer" style="display:none;">
            <table class="articles-table">
                <thead>
                    <tr><th>ID</th><th>标题</th><th>作者</th><th>状态</th><th>浏览量</th><th>创建时间</th><th>操作</th></tr>
                </thead>
                <tbody id="articlesTableBody"></tbody>
            </table>
        </div>
    </div>
    <script>
        const mockArticles = [
            {id:1,title:"FastAPI后端开发最佳实践",author:{username:"admin"},status:"published",view_count:1234,created_at:"2023-01-15T10:30:00Z"},
            {id:2,title:"Vue3组合式API使用指南",author:{username:"testuser"},status:"published",view_count:890,created_at:"2023-02-20T14:20:00Z"},
            {id:3,title:"Python异步编程入门",author:{username:"admin"},status:"draft",view_count:456,created_at:"2023-03-10T09:15:00Z"}
        ];
        document.addEventListener('DOMContentLoaded',function(){fetchArticles();});
        function fetchArticles(){document.getElementById('loading').style.display='none';document.getElementById('articlesTableContainer').style.display='block';renderArticles();}
        function renderArticles(){const tbody=document.getElementById('articlesTableBody');tbody.innerHTML='';mockArticles.forEach(a=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${a.id}</td><td><a href="article-detail.html?id=${a.id}">${a.title}</a></td><td>${a.author.username}</td><td><span class="status-badge status-${a.status}">${a.status==='published'?'已发布':'草稿'}</span></td><td>${a.view_count}</td><td>${new Date(a.created_at).toLocaleString()}</td><td><button class="btn btn-edit">编辑</button> <button class="btn btn-delete">删除</button></td>`;tbody.appendChild(tr);});}
    </script>
</body>
</html>
