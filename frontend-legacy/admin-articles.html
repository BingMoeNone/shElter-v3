<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏂囩珷绠＄悊</title>
    <style>
        :root {
            --color-primary: #00ff9d;
            --color-text: #fff;
            --color-text-muted: #aaa;
            --color-surface: #1a1a1a;
            --color-border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: var(--color-text);
            line-height: 1.6;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-articles {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-title {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .articles-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--color-text);
            font-size: 1rem;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .filter-bar {
            min-width: 150px;
        }

        .filter-bar select {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--color-text);
            font-size: 1rem;
        }

        .filter-bar select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--color-text-muted);
            padding: 40px;
        }

        .articles-table-container {
            overflow-x: auto;
        }

        .articles-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-surface);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
        }

        .articles-table th,
        .articles-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }

        .articles-table th {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .articles-table tr:last-child td {
            border-bottom: none;
        }

        .articles-table tr:hover {
            background: rgba(0, 255, 157, 0.05);
        }

        .article-title {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: capitalize;
        }

        .status-draft {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
        }

        .status-published {
            background: rgba(67, 233, 123, 0.2);
            color: #43e97b;
        }

        .status-archived {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-view {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
        }

        .btn-edit {
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0, 255, 157, 0.2);
        }

        .btn-view:hover {
            background: #4facfe;
            color: #fff;
        }

        .btn-edit:hover {
            background: #00f2fe;
            color: #000;
        }

        .btn-delete:hover {
            background: #ff6b6b;
            color: #fff;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }

        .page-btn {
            padding: 8px 16px;
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }
    </style>
</head>
<body>
    <header>
        <h1>绠＄悊鍛樺悗鍙?/h1>
        <nav>
            <ul>
                <li><a href="admin-dashboard.html">浠〃鐩?/a></li>
                <li><a href="admin-articles.html" class="active">鏂囩珷绠＄悊</a></li>
                <li><a href="admin-users.html">鐢ㄦ埛绠＄悊</a></li>
                <li><a href="admin-comments.html">璇勮绠＄悊</a></li>
                <li><a href="admin-moderation.html">鍐呭瀹℃牳</a></li>
                <li><a href="index.html">杩斿洖棣栭〉</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="admin-articles">
            <h1 class="page-title">鏂囩珷绠＄悊</h1>
            
            <div class="articles-header">
                <div class="search-bar">
                    <input
                        type="text"
                        id="searchQuery"
                        placeholder="鎼滅储鏂囩珷鏍囬鎴栧唴瀹?.."
                    />
                </div>
                <div class="filter-bar">
                    <select id="statusFilter">
                        <option value="">鎵€鏈夌姸鎬?/option>
                        <option value="draft">鑽夌</option>
                        <option value="published">宸插彂甯?/option>
                        <option value="archived">宸插綊妗?/option>
                    </select>
                </div>
            </div>
            
            <div id="loading" class="loading">鍔犺浇涓?..</div>
            
            <div id="articlesTableContainer" class="articles-table-container" style="display: none;">
                <table class="articles-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>鏍囬</th>
                            <th>浣滆€?/th>
                            <th>鐘舵€?/th>
                            <th>鍙戝竷鏃堕棿</th>
                            <th>鏌ョ湅娆℃暟</th>
                            <th>鎿嶄綔</th>
                        </tr>
                    </thead>
                    <tbody id="articlesTableBody">
                        <!-- 鏂囩珷鏁版嵁灏嗛€氳繃JavaScript鍔ㄦ€佺敓鎴?-->
                    </tbody>
                </table>
                
                <div id="pagination" class="pagination">
                    <button 
                        class="page-btn" 
                        id="prevPageBtn"
                        disabled
                    >
                        涓婁竴椤?                    </button>
                    
                    <span class="page-info" id="pageInfo">
                        绗?1 / 1 椤?                    </span>
                    
                    <button 
                        class="page-btn" 
                        id="nextPageBtn"
                        disabled
                    >
                        涓嬩竴椤?                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 妯℃嫙鏂囩珷鏁版嵁
        const mockArticles = [
            {
                id: 1,
                title: "杩欐槸涓€绡囨祴璇曟枃绔?,
                author: { username: "admin" },
                status: "published",
                published_at: "2023-01-15T10:30:00Z",
                view_count: 123
            },
            {
                id: 2,
                title: "Vue椤圭洰杩佺Щ鎸囧崡",
                author: { username: "testuser" },
                status: "published",
                published_at: "2023-02-20T14:20:00Z",
                view_count: 456
            },
            {
                id: 3,
                title: "FastAPI鍚庣寮€鍙戞渶浣冲疄璺?,
                author: { username: "admin" },
                status: "draft",
                published_at: null,
                view_count: 0
            },
            {
                id: 4,
                title: "HTML/CSS/JS鍒嗙鏋舵瀯璁捐",
                author: { username: "testuser" },
                status: "published",
                published_at: "2023-03-10T09:15:00Z",
                view_count: 789
            },
            {
                id: 5,
                title: "濯掍綋涓婁紶鍔熻兘瀹炵幇",
                author: { username: "admin" },
                status: "archived",
                published_at: "2022-12-05T16:45:00Z",
                view_count: 321
            }
        ];

        // 鐘舵€佺鐞?        let articles = [];
        let loading = true;
        let searchQuery = '';
        let currentPage = 1;
        let limit = 20;
        let totalItems = 0;
        let totalPages = 0;
        let statusFilter = '';

        // 椤甸潰鍔犺浇鏃跺垵濮嬪寲
        document.addEventListener('DOMContentLoaded', function() {
            // 缁戝畾浜嬩欢鐩戝惉鍣?            bindEventListeners();
            
            // 鑾峰彇鏂囩珷鏁版嵁
            fetchArticles();
        });

        // 缁戝畾浜嬩欢鐩戝惉鍣?        function bindEventListeners() {
            const searchInput = document.getElementById('searchQuery');
            const statusFilterSelect = document.getElementById('statusFilter');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');

            // 鎼滅储杈撳叆浜嬩欢
            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                currentPage = 1;
                fetchArticles();
            });

            // 鐘舵€佺瓫閫変簨浠?            statusFilterSelect.addEventListener('change', function() {
                statusFilter = this.value;
                currentPage = 1;
                fetchArticles();
            });

            // 鍒嗛〉鎸夐挳浜嬩欢
            prevPageBtn.addEventListener('click', function() {
                handlePageChange(currentPage - 1);
            });

            nextPageBtn.addEventListener('click', function() {
                handlePageChange(currentPage + 1);
            });
        }

        // 鑾峰彇鏂囩珷鏁版嵁
        function fetchArticles() {
            loading = true;
            updateUI();
            
            // 妯℃嫙API璇锋眰寤惰繜
            setTimeout(() => {
                try {
                    // 妯℃嫙API鍝嶅簲
                    let filteredArticles = [...mockArticles];
                    
                    // 搴旂敤鎼滅储绛涢€?                    if (searchQuery) {
                        filteredArticles = filteredArticles.filter(article => 
                            article.title.toLowerCase().includes(searchQuery.toLowerCase())
                        );
                    }
                    
                    // 搴旂敤鐘舵€佺瓫閫?                    if (statusFilter) {
                        filteredArticles = filteredArticles.filter(article => 
                            article.status === statusFilter
                        );
                    }
                    
                    articles = filteredArticles;
                    totalItems = articles.length;
                    totalPages = Math.ceil(totalItems / limit);
                } catch (error) {
                    console.error('Failed to fetch articles:', error);
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 500);
        }

        // 鏇存柊UI
        function updateUI() {
            const loadingElement = document.getElementById('loading');
            const articlesTableContainer = document.getElementById('articlesTableContainer');
            
            if (loading) {
                loadingElement.style.display = 'block';
                articlesTableContainer.style.display = 'none';
            } else {
                loadingElement.style.display = 'none';
                articlesTableContainer.style.display = 'block';
                renderArticlesTable();
                updatePagination();
            }
        }

        // 娓叉煋鏂囩珷琛ㄦ牸
        function renderArticlesTable() {
            const tableBody = document.getElementById('articlesTableBody');
            
            // 娓呯┖琛ㄦ牸
            tableBody.innerHTML = '';
            
            // 璁＄畻褰撳墠椤电殑鏂囩珷
            const startIndex = (currentPage - 1) * limit;
            const endIndex = startIndex + limit;
            const currentArticles = articles.slice(startIndex, endIndex);
            
            // 娓叉煋鏂囩珷琛?            currentArticles.forEach(article => {
                const row = document.createElement('tr');
                
                const publishedAt = article.published_at ? 
                    new Date(article.published_at).toLocaleString() : '-';
                
                row.innerHTML = `
                    <td>${article.id}</td>
                    <td class="article-title">${article.title}</td>
                    <td>${article.author.username}</td>
                    <td>
                        <span class="status-badge status-${article.status}">
                            ${article.status}
                        </span>
                    </td>
                    <td>${publishedAt}</td>
                    <td>${article.view_count}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-view" onclick="handleViewArticle(${article.id})">鏌ョ湅</button>
                            <button class="btn btn-edit" onclick="handleEditArticle(${article.id})">缂栬緫</button>
                        </div>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        // 鏇存柊鍒嗛〉
        function updatePagination() {
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            const pageInfo = document.getElementById('pageInfo');
            
            pageInfo.textContent = `绗?${currentPage} / ${totalPages} 椤礰;
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages;
        }

        // 澶勭悊椤电爜鍙樺寲
        function handlePageChange(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            fetchArticles();
        }

        // 澶勭悊鏌ョ湅鏂囩珷
        function handleViewArticle(articleId) {
            window.location.href = `article-detail.html?id=${articleId}`;
        }

        // 澶勭悊缂栬緫鏂囩珷
        function handleEditArticle(articleId) {
            window.location.href = `edit-article.html?id=${articleId}`;
        }
    </script>
</body>
</html>
