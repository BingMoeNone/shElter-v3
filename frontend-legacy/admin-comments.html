<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理</title>
    <style>
        :root {
            --color-primary: #00ff9d;
            --color-text: #fff;
            --color-text-muted: #aaa;
            --color-surface: #1a1a1a;
            --color-border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '寰蒋闆呴粦', SimHei, '榛戜綋', sans-serif;\n            background-color: var(--color-background);\n            color: var(--color-text);\n            line-height: 1.6;\n        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-comments {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-title {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .comments-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 1;
            min-width: 250px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--color-text);
            font-size: 1rem;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .filter-bar {
            min-width: 200px;
        }

        .filter-bar input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            color: var(--color-text);
            font-size: 1rem;
        }

        .filter-bar input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--color-text-muted);
            padding: 40px;
        }

        .comments-table-container {
            overflow-x: auto;
        }

        .comments-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-surface);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
        }

        .comments-table th,
        .comments-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }

        .comments-table th {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .comments-table tr:last-child td {
            border-bottom: none;
        }

        .comments-table tr:hover {
            background: rgba(0, 255, 157, 0.05);
        }

        .comment-content {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .article-link {
            background: none;
            border: none;
            color: var(--color-primary);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0;
        }

        .article-link:hover {
            color: #00c853;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: capitalize;
        }

        .status-approved {
            background: rgba(67, 233, 123, 0.2);
            color: #43e97b;
        }

        .status-pending {
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
        }

        .btn-delete:hover {
            background: #ff6b6b;
            color: #fff;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }

        .page-btn {
            padding: 8px 16px;
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }
    </style>
</head>
<body>
    <header>
        <h1>管理后台?/h1>
        <nav>
            <ul>
                <li><a href="admin-dashboard.html">仪表盘?/a></li>
                <li><a href="admin-articles.html">文章管理</a></li>
                <li><a href="admin-users.html">用户管理</a></li>
                <li><a href="admin-comments.html" class="active">评论管理</a></li>
                <li><a href="admin-moderation.html">内容审核</a></li>
                <li><a href="index.html">返回首页</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="admin-comments">
            <h1 class="page-title">评论管理</h1>
            
            <div class="comments-header">
                <div class="search-bar">
                    <input
                        type="text"
                        id="searchQuery"
                        placeholder="鎼滅储璇勮鍐呭..."
                    />
                </div>
                <div class="filter-bar">
                    <input
                        type="text"
                        id="articleIdFilter"
                        placeholder="鎸夋枃绔營D杩囨护..."
                    />
                </div>
            </div>
            
            <div id="loading" class="loading">鍔犺浇涓?..</div>
            
            <div id="commentsTableContainer" class="comments-table-container" style="display: none;">
                <table class="comments-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>鍐呭</th>
                            <th>浣滆€?/th>
                            <th>鏂囩珷</th>
                            <th>鐘舵€?/th>
                            <th>鍒涘缓鏃堕棿</th>
                            <th>鎿嶄綔</th>
                        </tr>
                    </thead>
                    <tbody id="commentsTableBody">
                        <!-- 璇勮鏁版嵁灏嗛€氳繃JavaScript鍔ㄦ€佺敓鎴?-->
                    </tbody>
                </table>
                
                <div id="pagination" class="pagination">
                    <button 
                        class="page-btn" 
                        id="prevPageBtn"
                        disabled
                    >
                        涓婁竴椤?                    </button>
                    
                    <span class="page-info" id="pageInfo">
                        绗?1 / 1 椤?                    </span>
                    
                    <button 
                        class="page-btn" 
                        id="nextPageBtn"
                        disabled
                    >
                        涓嬩竴椤?                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 妯℃嫙璇勮鏁版嵁
        const mockComments = [
            {
                id: 1,
                content: "杩欐槸涓€涓緢濂界殑鏂囩珷锛屽鍒颁簡寰堝锛?,
                author: { username: "user1" },
                article_id: 1,
                is_approved: true,
                created_at: "2023-01-15T11:30:00Z"
            },
            {
                id: 2,
                content: "鏈熷緟鏇村杩欐牱鐨勫唴瀹癸紒",
                author: { username: "user2" },
                article_id: 1,
                is_approved: true,
                created_at: "2023-01-15T12:45:00Z"
            },
            {
                id: 3,
                content: "杩欎釜闂鎴戜篃閬囧埌杩囷紝鎰熻阿鍒嗕韩锛?,
                author: { username: "user3" },
                article_id: 2,
                is_approved: true,
                created_at: "2023-02-20T15:20:00Z"
            },
            {
                id: 4,
                content: "鎴戞湁涓嶅悓鐨勭湅娉?..",
                author: { username: "user4" },
                article_id: 2,
                is_approved: false,
                created_at: "2023-02-20T16:10:00Z"
            },
            {
                id: 5,
                content: "闈炲父瀹炵敤鐨勬寚鍗楋紝璋㈣阿锛?,
                author: { username: "user5" },
                article_id: 3,
                is_approved: true,
                created_at: "2023-03-10T10:05:00Z"
            }
        ];

        // 鐘舵€佺鐞?        let comments = [];
        let loading = true;
        let searchQuery = '';
        let currentPage = 1;
        let limit = 20;
        let totalItems = 0;
        let totalPages = 0;
        let articleIdFilter = '';

        // 椤甸潰鍔犺浇鏃跺垵濮嬪寲
        document.addEventListener('DOMContentLoaded', function() {
            // 缁戝畾浜嬩欢鐩戝惉鍣?            bindEventListeners();
            
            // 鑾峰彇璇勮鏁版嵁
            fetchComments();
        });

        // 缁戝畾浜嬩欢鐩戝惉鍣?        function bindEventListeners() {
            const searchInput = document.getElementById('searchQuery');
            const articleIdFilterInput = document.getElementById('articleIdFilter');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');

            // 搜索输入事件
            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                currentPage = 1;
                fetchComments();
            });

            // 鏂囩珷ID绛涢€変簨浠?            articleIdFilterInput.addEventListener('input', function() {
                articleIdFilter = this.value;
                currentPage = 1;
                fetchComments();
            });

            // 鍒嗛〉鎸夐挳浜嬩欢
            prevPageBtn.addEventListener('click', function() {
                handlePageChange(currentPage - 1);
            });

            nextPageBtn.addEventListener('click', function() {
                handlePageChange(currentPage + 1);
            });
        }

        // 鑾峰彇璇勮鏁版嵁
        function fetchComments() {
            loading = true;
            updateUI();
            
            // 妯℃嫙API璇锋眰寤惰繜
            setTimeout(() => {
                try {
                    // 妯℃嫙API鍝嶅簲
                    let filteredComments = [...mockComments];
                    
                    // 搴旂敤鎼滅储绛涢€?                    if (searchQuery) {
                        filteredComments = filteredComments.filter(comment => 
                            comment.content.toLowerCase().includes(searchQuery.toLowerCase())
                        );
                    }
                    
                    // 搴旂敤鏂囩珷ID绛涢€?                    if (articleIdFilter) {
                        const articleId = parseInt(articleIdFilter);
                        if (!isNaN(articleId)) {
                            filteredComments = filteredComments.filter(comment => 
                                comment.article_id === articleId
                            );
                        }
                    }
                    
                    comments = filteredComments;
                    totalItems = comments.length;
                    totalPages = Math.ceil(totalItems / limit);
                } catch (error) {
                    console.error('Failed to fetch comments:', error);
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 500);
        }

        // 鏇存柊UI
        function updateUI() {
            const loadingElement = document.getElementById('loading');
            const commentsTableContainer = document.getElementById('commentsTableContainer');
            
            if (loading) {
                loadingElement.style.display = 'block';
                commentsTableContainer.style.display = 'none';
            } else {
                loadingElement.style.display = 'none';
                commentsTableContainer.style.display = 'block';
                renderCommentsTable();
                updatePagination();
            }
        }

        // 渲染评论表格
        function renderCommentsTable() {
            const tableBody = document.getElementById('commentsTableBody');
            
            // 娓呯┖琛ㄦ牸
            tableBody.innerHTML = '';
            
            // 计算当前页的评论
            const startIndex = (currentPage - 1) * limit;
            const endIndex = startIndex + limit;
            const currentComments = comments.slice(startIndex, endIndex);
            
            // 渲染评论表?            currentComments.forEach(comment => {
                const row = document.createElement('tr');
                
                const createdAt = new Date(comment.created_at).toLocaleString();
                const status = comment.is_approved ? 'approved' : 'pending';
                const statusText = comment.is_approved ? '宸叉壒鍑? : '寰呮壒鍑?;
                
                row.innerHTML = `
                    <td>${comment.id}</td>
                    <td class="comment-content">${comment.content}</td>
                    <td>${comment.author.username}</td>
                    <td>
                        <button class="article-link" onclick="handleViewArticle(${comment.article_id})">
                            查看文章
                        </button>
                    </td>
                    <td>
                        <span class="status-badge status-${status}">
                            ${statusText}
                        </span>
                    </td>
                    <td>${createdAt}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-delete" onclick="handleDeleteComment(${comment.id})">鍒犻櫎</button>
                        </div>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        // 鏇存柊鍒嗛〉
        function updatePagination() {
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            const pageInfo = document.getElementById('pageInfo');
            
            pageInfo.textContent = `绗?${currentPage} / ${totalPages} 椤礰;
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages;
        }

        // 澶勭悊椤电爜鍙樺寲
        function handlePageChange(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            fetchComments();
        }

        // 澶勭悊查看文章
        function handleViewArticle(articleId) {
            window.location.href = `article-detail.html?id=${articleId}`;
        }

        // 澶勭悊鍒犻櫎璇勮
        function handleDeleteComment(commentId) {
            if (confirm('纭畾瑕佸垹闄よ繖涓瘎璁哄悧锛?)) {
                // 妯℃嫙API璇锋眰
                setTimeout(() => {
                    // 浠庢ā鎷熸暟鎹腑鍒犻櫎璇勮
                    mockComments = mockComments.filter(comment => comment.id !== commentId);
                    // 閲嶆柊鑾峰彇璇勮鏁版嵁
                    fetchComments();
                }, 300);
            }
        }
    </script>
</body>
</html>
