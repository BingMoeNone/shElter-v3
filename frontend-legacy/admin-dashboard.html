<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板</title>
    <style>
        :root {
            --color-primary: #00ff9d;
            --color-surface: #1a1a1a;
            --color-border: #333;
            --color-text: #fff;
            --color-text-muted: #aaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '寰蒋闆呴粦', SimHei, '榛戜綋', sans-serif;\n            background-color: var(--color-background);\n            color: var(--color-text);\n            line-height: 1.6;\n        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .admin-dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-title {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 30px;
            text-align: center;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--color-surface);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 255, 157, 0.2);
        }

        .stat-card.warning {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.05);
        }

        .stat-icon {
            font-size: 3rem;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .users-icon {
            color: #4facfe;
        }

        .articles-icon {
            color: #00f2fe;
        }

        .comments-icon {
            color: #43e97b;
        }

        .pending-icon {
            color: #ffcc00;
        }

        .stat-content {
            flex: 1;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--color-text);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1rem;
            color: var(--color-text-muted);
            margin-bottom: 15px;
        }

        .stat-action {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .stat-action:hover {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 10px var(--color-primary);
        }
    </style>
</head>
<body>
    <header>
        <h1>管理后台?/h1>
        <nav>
            <ul>
                <li><a href="admin-dashboard.html" class="active">仪表盘?/a></li>
                <li><a href="admin-articles.html">文章管理</a></li>
                <li><a href="admin-users.html">用户管理</a></li>
                <li><a href="admin-comments.html">评论管理</a></li>
                <li><a href="admin-moderation.html">内容审核</a></li>
                <li><a href="index.html">返回首页</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="admin-dashboard">
            <h1 class="dashboard-title">管理面板</h1>
            
            <div class="dashboard-grid">
                <div class="stat-card">
                    <div class="stat-icon users-icon">馃懃</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalUsers">0</div>
                        <div class="stat-label">鎬荤敤鎴锋暟</div>
                        <button class="stat-action" onclick="window.location.href='admin-users.html'">查看用户</button>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon articles-icon">馃摑</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalArticles">0</div>
                        <div class="stat-label">鎬绘枃绔犳暟</div>
                        <button class="stat-action" onclick="window.location.href='admin-articles.html'">查看文章</button>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon comments-icon">馃挰</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalComments">0</div>
                        <div class="stat-label">鎬昏瘎璁烘暟</div>
                        <button class="stat-action" onclick="window.location.href='admin-comments.html'">查看评论</button>
                    </div>
                </div>
                
                <div class="stat-card warning">
                    <div class="stat-icon pending-icon">鈴?/div>
                    <div class="stat-content">
                        <div class="stat-value" id="pendingArticles">0</div>
                        <div class="stat-label">寰呭鏍告枃绔?/div>
                        <button class="stat-action" onclick="window.location.href='admin-moderation.html'">审核文章</button>
                    </div>
                </div>
                
                <div class="stat-card warning">
                    <div class="stat-icon pending-icon">鈴?/div>
                    <div class="stat-content">
                        <div class="stat-value" id="pendingComments">0</div>
                        <div class="stat-label">寰呭鏍歌瘎璁?/div>
                        <button class="stat-action" onclick="window.location.href='admin-moderation.html'">审核评论</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 妯℃嫙鏁版嵁
        const mockStats = {
            totalUsers: 125,
            totalArticles: 342,
            totalComments: 1567,
            pendingArticles: 8,
            pendingComments: 23
        };

        // 椤甸潰鍔犺浇鏃跺垵濮嬪寲鏁版嵁
        document.addEventListener('DOMContentLoaded', function() {
            // 妯℃嫙API璇锋眰寤惰繜
            setTimeout(() => {
                document.getElementById('totalUsers').textContent = mockStats.totalUsers;
                document.getElementById('totalArticles').textContent = mockStats.totalArticles;
                document.getElementById('totalComments').textContent = mockStats.totalComments;
                document.getElementById('pendingArticles').textContent = mockStats.pendingArticles;
                document.getElementById('pendingComments').textContent = mockStats.pendingComments;
            }, 500);
        });
    </script>
</body>
</html>
