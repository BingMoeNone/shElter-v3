<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Platform - Articles</title>
    <script src="utils.js"></script>
    <style>
        /* Global Styles */
        :root {
            --color-primary: #00ff88;
            --color-secondary: #00d4ff;
            --color-accent: #ff6b6b;
            --color-text: #ffffff;
            --color-text-muted: #aaaaaa;
            --color-background: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-border: #333333;
            --font-family-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-family-heading: 'Arial', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-primary);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            color: var(--color-primary);
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--color-text);
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--color-primary);
            text-shadow: 0 0 5px var(--color-primary);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--color-primary);
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--color-primary);
            color: #000;
        }

        /* Articles Page Styles */
        .articles-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            margin: 0;
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
        }

        .search-section {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin-bottom: 24px;
        }

        .search-section input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--color-primary);
            background: rgba(0, 0, 0, 0.5);
            color: var(--color-text);
            border-radius: 4px;
            font-size: 16px;
        }

        .search-section input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--color-primary);
        }

        .search-section button {
            padding: 12px 24px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-section button:hover {
            background: var(--color-primary);
            color: #000;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--color-text-muted);
            border: 1px dashed var(--color-text-muted);
            border-radius: 8px;
        }

        .no-articles {
            text-align: center;
            padding: 40px;
            color: var(--color-text-muted);
            border: 1px dashed var(--color-text-muted);
            border-radius: 8px;
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .article-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
        }

        .article-title {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--color-primary);
            text-decoration: none;
        }

        .article-title:hover {
            text-shadow: 0 0 5px var(--color-primary);
        }

        .article-meta {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin-bottom: 12px;
        }

        .article-summary {
            margin-bottom: 16px;
            color: var(--color-text);
        }

        .article-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .tag:hover {
            background: var(--color-primary);
            color: #000;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 32px;
        }

        .pagination button {
            padding: 8px 16px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            color: var(--color-text-muted);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Wiki Platform</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="articles.html" class="nav-link">Articles</a>
                <a href="categories.html" class="nav-link">Categories</a>
                <a href="metro.html" class="nav-link">Metro</a>
                <a href="music.html" class="nav-link">Music</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn">Login</a>
                <a href="register.html" class="btn">Register</a>
            </div>
        </div>
    </nav>

    <!-- Articles Page Content -->
    <div class="articles-page">
        <!-- 面包屑导航 -->
        <div id="breadcrumb" class="breadcrumb"></div>
        
        <!-- 登录状态指示器 -->
        <div style="text-align: right; margin-bottom: 16px;">
            <div id="auth-indicator" class="auth-indicator"></div>
        </div>
        
        <div class="page-header">
            <h1>Articles</h1>
            <a href="create-article.html" class="btn">Create Article</a>
        </div>
        
        <div class="search-section">
            <input type="search" placeholder="Search articles..." id="searchInput">
            <button onclick="handleSearch()">Search</button>
        </div>
        
        <div id="loading" class="loading">
            Loading articles...
        </div>
        
        <div id="noArticles" class="no-articles" style="display: none;">
            No articles found.
        </div>
        
        <div id="articlesList" class="articles-list" style="display: none;">
            <!-- Articles will be inserted here by JavaScript -->
        </div>
        
        <div id="pagination" class="pagination" style="display: none;">
            <button id="prevBtn" onclick="changePage(currentPage - 1)">Previous</button>
            <span id="pageInfo"></span>
            <button id="nextBtn" onclick="changePage(currentPage + 1)">Next</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const loadingElement = document.getElementById('loading');
        const noArticlesElement = document.getElementById('noArticles');
        const articlesListElement = document.getElementById('articlesList');
        const searchInputElement = document.getElementById('searchInput');
        const paginationElement = document.getElementById('pagination');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');

        // State
        let currentPage = 1;
        const pageSize = 10;
        let totalPages = 1;
        let allArticles = [];

        // Mock articles data
        const mockArticles = [
            {
                id: "1",
                title: "Getting Started with Wiki Platform",
                slug: "getting-started-with-wiki-platform",
                summary: "Learn how to start using our wiki platform to create and share knowledge.",
                author: { username: "admin", id: "1" },
                created_at: "2026-02-19T10:00:00Z",
                categories: [{ name: "Guides", slug: "guides" }],
                tags: [{ name: "getting-started", slug: "getting-started" }, { name: "wiki", slug: "wiki" }]
            },
            {
                id: "2",
                title: "Understanding the Metro Map Feature",
                slug: "understanding-the-metro-map-feature",
                summary: "Explore the interactive metro map feature and how to navigate through different stations.",
                author: { username: "moderator", id: "2" },
                created_at: "2026-02-18T15:30:00Z",
                categories: [{ name: "Features", slug: "features" }],
                tags: [{ name: "metro", slug: "metro" }, { name: "map", slug: "map" }]
            },
            {
                id: "3",
                title: "Music Player Usage Guide",
                slug: "music-player-usage-guide",
                summary: "How to use the built-in music player to listen to tracks and manage playlists.",
                author: { username: "user1", id: "3" },
                created_at: "2026-02-17T09:15:00Z",
                categories: [{ name: "Guides", slug: "guides" }],
                tags: [{ name: "music", slug: "music" }, { name: "player", slug: "player" }]
            },
            {
                id: "4",
                title: "Creating Your First Article",
                slug: "creating-your-first-article",
                summary: "Step-by-step guide to creating and publishing your first article on the platform.",
                author: { username: "admin", id: "1" },
                created_at: "2026-02-16T14:45:00Z",
                categories: [{ name: "Tutorials", slug: "tutorials" }],
                tags: [{ name: "article", slug: "article" }, { name: "tutorial", slug: "tutorial" }]
            },
            {
                id: "5",
                title: "Advanced Search Techniques",
                slug: "advanced-search-techniques",
                summary: "Master the art of finding exactly what you're looking for with our advanced search features.",
                author: { username: "moderator", id: "2" },
                created_at: "2026-02-15T11:20:00Z",
                categories: [{ name: "Guides", slug: "guides" }],
                tags: [{ name: "search", slug: "search" }, { name: "tips", slug: "tips" }]
            }
        ];

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化页面优化功能
            initPage('articles', '文章列表');
            
            fetchArticles();
        });

        // Fetch articles
        function fetchArticles() {
            loadingElement.style.display = 'block';
            noArticlesElement.style.display = 'none';
            articlesListElement.style.display = 'none';
            paginationElement.style.display = 'none';

            // Simulate API call
            setTimeout(() => {
                allArticles = mockArticles;
                totalPages = Math.ceil(allArticles.length / pageSize);
                displayArticles();
            }, 800);
        }

        // Display articles for current page
        function displayArticles() {
            loadingElement.style.display = 'none';
            
            if (allArticles.length === 0) {
                noArticlesElement.style.display = 'block';
                return;
            }
            
            // Calculate pagination
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedArticles = allArticles.slice(startIndex, endIndex);
            
            // Clear existing articles
            articlesListElement.innerHTML = '';
            
            // Create article cards
            paginatedArticles.forEach(article => {
                const articleCard = createArticleCard(article);
                articlesListElement.appendChild(articleCard);
            });
            
            // Update UI
            articlesListElement.style.display = 'block';
            updatePagination();
        }

        // Create article card element
        function createArticleCard(article) {
            const card = document.createElement('div');
            card.className = 'article-card';
            
            const formattedDate = new Date(article.created_at).toLocaleDateString();
            
            card.innerHTML = `
                <h3><a href="article-detail.html?id=${article.id}" class="article-title">${article.title}</a></h3>
                <div class="article-meta">
                    By <a href="user-profile.html?id=${article.author.id}">${article.author.username}</a> 鈥?${formattedDate}
                </div>
                <p class="article-summary">${article.summary}</p>
                <div class="article-tags">
                    ${article.tags.map(tag => `<a href="tag-articles.html?slug=${tag.slug}" class="tag">${tag.name}</a>`).join('')}
                </div>
            `;
            
            return card;
        }

        // Update pagination UI
        function updatePagination() {
            pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
            paginationElement.style.display = 'flex';
        }

        // Change page
        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            displayArticles();
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Handle search
        function handleSearch() {
            const searchQuery = searchInputElement.value.trim();
            
            if (searchQuery) {
                // Simulate search by filtering mock data
                allArticles = mockArticles.filter(article => 
                    article.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    article.summary.toLowerCase().includes(searchQuery.toLowerCase())
                );
            } else {
                allArticles = mockArticles;
            }
            
            totalPages = Math.ceil(allArticles.length / pageSize);
            currentPage = 1;
            displayArticles();
        }

        // Handle search input enter key
        searchInputElement.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });
    </script>
</body>
</html>
