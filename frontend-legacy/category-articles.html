﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类文章</title>
    <link rel="stylesheet" href="styles.css">
    <script src="utils.js"></script>
    <style>
        /* Wiki Platform V3 统一样式 - 优化后的现代深色主题 */
        :root {
            /* 主色调 - 使用更亮的蓝色，提高对比度和可读性 */
            --color-primary: #3B82F6;
            --color-primary-dark: #2563EB;
            --color-primary-light: #60A5FA;
            --color-primary-soft: rgba(59, 130, 246, 0.15);
            
            /* 辅助色 - 紫色系 */
            --color-secondary: #8B5CF6;
            --color-secondary-dark: #7C3AED;
            --color-secondary-light: #A78BFA;
            --color-secondary-soft: rgba(139, 92, 246, 0.15);
            
            /* 强调色 - 绿色系 */
            --color-accent: #10B981;
            --color-accent-dark: #059669;
            --color-accent-light: #34D399;
            --color-accent-soft: rgba(16, 185, 129, 0.15);
            
            /* 语义色 */
            --color-success: #10B981;
            --color-success-soft: rgba(16, 185, 129, 0.1);
            --color-danger: #EF4444;
            --color-danger-soft: rgba(239, 68, 68, 0.1);
            --color-warning: #F59E0B;
            --color-warning-soft: rgba(245, 158, 11, 0.1);
            --color-info: #3B82F6;
            --color-info-soft: rgba(59, 130, 246, 0.1);
            
            /* 文字颜色 - 提高对比度 */
            --color-text: #F1F5F9;
            --color-text-muted: #94A3B8;
            --color-text-dark: #64748B;
            --color-text-inverse: #0F172A;
            
            /* 背景颜色 - 使用蓝灰色调，更现代 */
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-surface-hover: #334155;
            --color-surface-active: #475569;
            
            /* 边框颜色 */
            --color-border: #334155;
            --color-border-light: #475569;
            --color-border-focus: #3B82F6;
            
            /* 阴影颜色 */
            --shadow-color: rgba(15, 23, 42, 0.5);
            --shadow-color-light: rgba(59, 130, 246, 0.2);
            
            /* 渐变背景 */
            --gradient-primary: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --gradient-secondary: linear-gradient(135deg, #10B981 0%, #3B82F6 100%);
            --gradient-dark: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* 导航栏 */
        nav {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-logo:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--color-text-muted);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--color-primary);
            background: var(--color-primary-soft);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--shadow-color-light);
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .category-articles-page {
            max-width: 1000px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 32px;
            padding: 24px;
            background: var(--color-surface);
            border-radius: 12px;
            border: 1px solid var(--color-border);
        }

        .page-header h1 {
            margin: 0 0 8px 0;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 2rem;
        }

        .page-header p {
            color: var(--color-text-muted);
            margin: 0;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
            background: var(--color-surface);
            border-radius: 12px;
            border: 2px dashed var(--color-border);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-danger);
            text-align: center;
            background: var(--color-surface);
            border-radius: 12px;
            border: 2px dashed var(--color-danger-soft);
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .retry-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: var(--color-danger-soft);
            border: 1px solid var(--color-danger);
            color: var(--color-danger);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .retry-btn:hover {
            background: var(--color-danger);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
            text-align: center;
            background: var(--color-surface);
            border: 2px dashed var(--color-border);
            border-radius: 12px;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .create-link {
            margin-top: 16px;
            color: var(--color-primary);
            padding: 10px 24px;
            border: 1px solid var(--color-primary);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
            display: inline-block;
        }

        .create-link:hover {
            background: var(--color-primary);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 文章卡片样式 */
        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: all 0.2s ease;
        }

        .article-card:hover {
            transform: translateY(-4px);
            border-color: var(--color-primary);
            box-shadow: 0 8px 24px var(--shadow-color);
        }

        .article-card-header {
            margin-bottom: 16px;
        }

        .article-card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .article-card-title a {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .article-card-title a:hover {
            opacity: 0.8;
        }

        .article-card-meta {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
            flex-wrap: wrap;
        }

        .article-card-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .article-card-excerpt {
            color: var(--color-text);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .article-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .article-card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .article-card-tag {
            background: var(--color-accent-soft);
            color: var(--color-accent);
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-weight: 500;
        }

        .article-card-tag:hover {
            background: var(--color-accent);
            color: #fff;
            transform: translateY(-1px);
        }

        .article-card-read-more {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .article-card-read-more:hover {
            opacity: 0.8;
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Wiki Platform</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="articles.html" class="nav-link">文章</a>
                <a href="categories.html" class="nav-link">分类</a>
                <a href="metro.html" class="nav-link">地铁图</a>
                <a href="music.html" class="nav-link">音乐</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn">登录</a>
                <a href="register.html" class="btn btn-primary">注册</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="category-articles-page">
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载文章...</p>
            </div>
            
            <div id="errorState" class="error-state" style="display: none;">
                <span class="error-icon">⚠️</span>
                <p id="errorMessage">加载失败</p>
                <button id="retryBtn" class="retry-btn">重试</button>
            </div>
            
            <div id="content" style="display: none;">
                <header class="page-header">
                    <h1 id="categoryName">分类</h1>
                    <p id="categoryDescription">无描述</p>
                </header>
                
                <div id="emptyState" class="empty-state" style="display: none;">
                    <span class="empty-icon">📂</span>
                    <p>该分类下无文章</p>
                    <a href="create-article.html" class="create-link">创建第一篇文章</a>
                </div>
                
                <div id="articlesList" class="articles-list">
                    <!-- 文章卡片将通过 JavaScript 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const mockCategories = [
            {
                id: 1,
                name: "技术分类",
                slug: "tech",
                description: "分享各种技术文章和教程"
            },
            {
                id: 2,
                name: "生活随笔",
                slug: "life",
                description: "记录生活中的点滴感悟"
            },
            {
                id: 3,
                name: "旅行日记",
                slug: "travel",
                description: "分享旅行经历和见闻"
            }
        ];

        const mockArticles = [
            {
                id: 1,
                title: "FastAPI 后端开发最佳实践",
                slug: "fastapi-best-practices",
                excerpt: "本文介绍了使用 FastAPI 开发后端应用的最佳实践，包括路由设计、数据库集成、认证体系等方面。",
                author: { username: "admin" },
                category: "tech",
                tags: ["fastapi", "python", "backend"],
                created_at: "2023-01-15T10:30:00Z",
                updated_at: "2023-01-15T14:45:00Z",
                view_count: 123,
                comment_count: 8
            },
            {
                id: 2,
                title: "Vue 项目迁移指南",
                slug: "vue-migration-guide",
                excerpt: "本文介绍了如何将 Vue 2 项目迁移到 Vue 3，包括主要变更点、迁移策略和注意事项。",
                author: { username: "testuser" },
                category: "tech",
                tags: ["vue", "frontend", "migration"],
                created_at: "2023-02-20T14:20:00Z",
                updated_at: "2023-02-20T16:30:00Z",
                view_count: 456,
                comment_count: 15
            },
            {
                id: 3,
                title: "HTML/CSS/JS 分离架构设计",
                slug: "html-css-js-architecture",
                excerpt: "本文探讨了 HTML、CSS 和 JavaScript 分离架构的设计原则和最佳实践，以及如何构建可维护的前端应用。",
                author: { username: "admin" },
                category: "tech",
                tags: ["html", "css", "javascript", "architecture"],
                created_at: "2023-03-10T09:15:00Z",
                updated_at: "2023-03-10T11:20:00Z",
                view_count: 789,
                comment_count: 23
            }
        ];

        // 状态管理
        let category = null;
        let articles = [];
        let loading = true;
        let error = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定事件监听器
            bindEventListeners();
            
            // 获取数据
            fetchData();
        });

        // 绑定事件监听器
        function bindEventListeners() {
            // 重试按钮事件
            document.getElementById('retryBtn').addEventListener('click', function() {
                fetchData();
            });
        }

        // 获取数据
        function fetchData() {
            loading = true;
            error = null;
            updateUI();
            
            // 模拟 API 请求延迟
            setTimeout(() => {
                try {
                    // 模拟从 URL 获取分类 slug，这里使用默认值"tech"
                    const slug = "tech"; // 实际项目中可以从 URL 参数获取
                    
                    // 模拟获取分类
                    category = mockCategories.find(c => c.slug === slug) || null;
                    
                    // 模拟获取文章
                    articles = [...mockArticles.filter(article => article.category === slug)]; // 使用扩展运算符保护原始数据
                } catch (err) {
                    console.error('Failed to fetch data:', err);
                    error = "加载失败，请稍后重试";
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 800);
        }

        // 更新 UI
        function updateUI() {
            const loadingElement = document.getElementById('loading');
            const errorStateElement = document.getElementById('errorState');
            const contentElement = document.getElementById('content');
            
            if (loading) {
                loadingElement.style.display = 'flex';
                errorStateElement.style.display = 'none';
                contentElement.style.display = 'none';
            } else if (error) {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'flex';
                document.getElementById('errorMessage').textContent = error;
                contentElement.style.display = 'none';
            } else {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'none';
                contentElement.style.display = 'block';
                
                // 更新分类信息
                if (category) {
                    document.getElementById('categoryName').textContent = category.name;
                    if (category.description) {
                        document.getElementById('categoryDescription').textContent = category.description;
                    } else {
                        document.getElementById('categoryDescription').textContent = '无描述';
                    }
                }
                
                // 更新文章列表
                if (articles.length === 0) {
                    document.getElementById('emptyState').style.display = 'flex';
                    document.getElementById('articlesList').style.display = 'none';
                } else {
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('articlesList').style.display = 'flex';
                    renderArticlesList();
                }
            }
        }

        // 渲染文章列表
        function renderArticlesList() {
            const articlesList = document.getElementById('articlesList');
            
            // 清空列表
            articlesList.innerHTML = '';
            
            // 渲染文章卡片
            articles.forEach(article => {
                const articleCard = document.createElement('div');
                articleCard.className = 'article-card';
                
                // 格式化日期
                const createdAt = new Date(article.created_at).toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                // 生成标签 HTML
                const tagsHTML = article.tags.map(tag => 
                    `<a href="tag-articles.html?tag=${tag}" class="article-card-tag">${tag}</a>`
                ).join('');
                
                articleCard.innerHTML = `
                    <div class="article-card-header">
                        <h2 class="article-card-title">
                            <a href="article-detail.html?id=${article.id}">${article.title}</a>
                        </h2>
                        <div class="article-card-meta">
                            <span class="article-card-meta-item">
                                <span>👤</span>
                                <span>${article.author.username}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>📅</span>
                                <span>${createdAt}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>👁️</span>
                                <span>${article.view_count}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>💬</span>
                                <span>${article.comment_count}</span>
                            </span>
                        </div>
                    </div>
                    <div class="article-card-excerpt">${article.excerpt}</div>
                    <div class="article-card-footer">
                        <div class="article-card-tags">${tagsHTML}</div>
                        <a href="article-detail.html?id=${article.id}" class="article-card-read-more">阅读更多 →</a>
                    </div>
                `;
                
                articlesList.appendChild(articleCard);
            });
        }
    </script>
</body>
</html>
