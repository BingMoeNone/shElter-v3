    <script>
        // еҰҜв„ғе«ҷйҸҒзүҲеөҒ

            {

            }
        ];

        const mockArticles = [
            {
                id: 1,
                title: "FastAPIйҚҡеәЈоҒ¬еҜ®вӮ¬йҚҷжҲһжё¶жөЈеҶІз–„з’ә?,
                slug: "fastapi-best-practices",
                excerpt: "йҸҲо„Ғжһғжө е¬¬зІӣжөңе—•еЁҮйҗўвҖөastAPIеҜ®вӮ¬йҚҷжҲқжӮ—з»”оҲҡз°Ійҗўг„§ж®‘йҸҲвӮ¬жөЈеҶІз–„з’әзўүзҙқйҚ–е‘®е«ӯз’әоҲңж•ұз’ҒжҚҗо…ёйҠҶдҪ№жҡҹйҺ№оҶјз°ұй—Ҷе—ҳеһҡйҠҶдҪҪо…»з’ҮдҪ№е·ҝйҸүеҶӘз“‘йҸӮеҪ’жҪ°йҠҶ?,
                author: { username: "admin" },
                category: "tech",
                tags: ["fastapi", "python", "backend"],
                created_at: "2023-01-15T10:30:00Z",
                updated_at: "2023-01-15T14:45:00Z",
                view_count: 123,
                comment_count: 8
            },
            {
                id: 2,
                title: "VueжӨӨеңӯжҙ°жқ©дҪәР©йҺёеӣ§еҙЎ",
                slug: "vue-migration-guide",
                excerpt: "йҸҲо„Ғжһғжө е¬¬зІӣжөңе——оӣ§жөЈжӣһзҡўVue 2жӨӨеңӯжҙ°жқ©дҪәР©йҚ’зҷЎue 3й”ӣеұҪеҜҳйҺ·оғҝеҜҢз‘•дҪёеҪүйҸҮеҜёеҒЈйҠҶдҪҪзёјз»үиҚӨз“ҘйҗЈгғҘжӢ°еЁүг„Ұеү°жөңе¬®гҖҚйҠҶ?,
                author: { username: "testuser" },
                category: "tech",
                tags: ["vue", "frontend", "migration"],
                created_at: "2023-02-20T14:20:00Z",
                updated_at: "2023-02-20T16:30:00Z",
                view_count: 456,
                comment_count: 15
            },
            {
                id: 3,
                title: "HTML/CSS/JSйҚ’е—ҷоһҮйҸӢиҲөзҖҜз’ҒжҚҗо…ё",
                slug: "html-css-js-architecture",
                excerpt: "йҸҲо„ҒжһғйҺәгҲЈо…ҝжөңе’№TMLйҠҶдёҶSSйҚңеӯһavaScriptйҚ’е—ҷоһҮйҸӢиҲөзҖҜйҗЁеӢ®оҶ•з’ҒвҖіеё«йҚ’ж¬ҸжӢ°йҸҲвӮ¬жөЈеҶІз–„з’әзўүзҙқжө гғҘеј·жҝЎеӮҷз¶ҚйҸӢеӢ«зј“йҚҷоҲңж·®йҺ¶гӮҮж®‘йҚ“е¶ҮоҒ¬жҗҙж—Ӯж•ӨйҠҶ?,
                author: { username: "admin" },
                category: "tech",
                tags: ["html", "css", "javascript", "architecture"],
                created_at: "2023-03-10T09:15:00Z",
                updated_at: "2023-03-10T11:20:00Z",
                view_count: 789,
                comment_count: 23
            }
        ];

        // йҗҳиҲөвӮ¬дҪәо…ёйҗһ?        let category = null;
        let articles = [];
        let loading = true;
        let error = null;

        // жӨӨз”ёжҪ°йҚ”зҠәжөҮйҸғи·әеһөжҝ®е¬ӘеҜІ
        document.addEventListener('DOMContentLoaded', function() {
            // зјҒжҲқз•ҫжөңе¬©ж¬ўйҗ©жҲқжғүйҚЈ?            bindEventListeners();
            
            // й‘ҫеі°еҪҮйҸҒзүҲеөҒ
            fetchData();
        });

        // зјҒжҲқз•ҫжөңе¬©ж¬ўйҗ©жҲқжғүйҚЈ?        function bindEventListeners() {
            // й–Іе¶ҲзҳҜйҺёеӨҗжҢіжөңе¬©ж¬ў
            document.getElementById('retryBtn').addEventListener('click', function() {
                fetchData();
            });
        }

        // й‘ҫеі°еҪҮйҸҒзүҲеөҒ
        function fetchData() {
            loading = true;
            error = null;
            updateUI();
            
            // еҰҜв„ғе«ҷAPIз’Үй”Ӣзң°еҜӨжғ°з№ң
            setTimeout(() => {
                try {
                    // еҰҜв„ғе«ҷжө е¶¶RLй‘ҫеі°еҪҮйҚ’е—ҷиў«slugй”ӣеІғз№–й–ІеұјеЁҮйҗўг„©зІҜз’ҒгӮ…вӮ¬?tech"
                    const slug = "tech"; // зҖ№зӮәжӘҜжӨӨеңӯжҙ°ж¶“о…һеҪІжө гғӨзІ URLйҚҷеӮӣжҡҹй‘ҫеі°еҪҮ
                    
                    // еҰҜв„ғе«ҷй‘ҫеі°еҪҮйҚ’е—ҷиў«
                    category = mockCategories.find(c => c.slug === slug) || null;
                    
                    // еҰҜв„ғе«ҷй‘ҫеі°еҪҮйҸӮеӣ©зҸ·
                    articles = mockArticles.filter(article => article.category === slug);
                } catch (err) {
                    console.error('Failed to fetch data:', err);
                    error = "йҚ”зҠәжөҮжҫ¶иҫ«и§Ұ";
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 800);
        }

        // йҸҮеӯҳжҹҠUI
        function updateUI() {
            const loadingElement = document.getElementById('loading');
            const errorStateElement = document.getElementById('errorState');
            const contentElement = document.getElementById('content');
            
            if (loading) {
                loadingElement.style.display = 'flex';
                errorStateElement.style.display = 'none';
                contentElement.style.display = 'none';
            } else if (error) {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'flex';
                document.getElementById('errorMessage').textContent = error;
                contentElement.style.display = 'none';
            } else {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'none';
                contentElement.style.display = 'block';
                
                // йҸҮеӯҳжҹҠйҚ’е—ҷиў«ж·Үв„ғдј…
                if (category) {
                    document.getElementById('categoryName').textContent = category.name;
                    if (category.description) {
                        document.getElementById('categoryDescription').textContent = category.description;
                        document.getElementById('categoryDescription').classList.remove('no-description');
                    } else {
                        document.getElementById('categoryDescription').textContent = 'йҸҶеӮӣжЈӨйҺ»еҝҡе Ә';
                        document.getElementById('categoryDescription').classList.add('no-description');
                    }
                }
                
                // йҸҮеӯҳжҹҠйҸӮеӣ©зҸ·йҚ’жҘ„гҖғ
                if (articles.length === 0) {
                    document.getElementById('emptyState').style.display = 'flex';
                    document.getElementById('articlesList').style.display = 'none';
                } else {
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('articlesList').style.display = 'flex';
                    renderArticlesList();
                }
            }
        }

        // еЁ“еҸүз…ӢйҸӮеӣ©зҸ·йҚ’жҘ„гҖғ
        function renderArticlesList() {
            const articlesList = document.getElementById('articlesList');
            
            // еЁ“е‘Ҝв”–йҚ’жҘ„гҖғ
            articlesList.innerHTML = '';
            
            // еЁ“еҸүз…ӢйҸӮеӣ©зҸ·йҚ—пј„еў–
            articles.forEach(article => {
                const articleCard = document.createElement('div');
                articleCard.className = 'article-card';
                
                // йҸҚз…ҺзҙЎйҚ–ж ЁжЈ©йҸҲ?                const createdAt = new Date(article.created_at).toLocaleDateString('zh-CN');
                
                // йҗўзҶёеһҡйҸҚеӣ©о„·HTML
                const tagsHTML = article.tags.map(tag => 
                    `<a href="tag-articles.html?tag=${tag}" class="article-card-tag">${tag}</a>`
                ).join('');
                
                articleCard.innerHTML = `
                    <div class="article-card-header">
                        <h2 class="article-card-title">
                            <a href="article-detail.html?id=${article.id}">${article.title}</a>
                        </h2>
                        <div class="article-card-meta">
                            <span class="article-card-meta-item">
                                <span>йҰғжҮҒ</span>
                                <span>${article.author.username}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>йҰғжҗ®</span>
                                <span>${createdAt}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>йҰғжҶ—й””?/span>
                                <span>${article.view_count}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>йҰғжҢ°</span>
                                <span>${article.comment_count}</span>
                            </span>
                        </div>
                    </div>
                    <div class="article-card-excerpt">${article.excerpt}</div>
                    <div class="article-card-footer">
                        <div class="article-card-tags">${tagsHTML}</div>
                        <a href="article-detail.html?id=${article.id}" class="article-card-read-more">й—ғе‘°оҮ°йҸҮжқ‘оҳҝ йҲ«?/a>
                    </div>
                `;
                
                articlesList.appendChild(articleCard);
            });
        }
