<!DOCTYPE html>
<html lang="zh-CN">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建文章</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="api-client.js"></script>
    <style>
        /* Wiki Platform V3 统一样式 - 优化后的现代深色主题 */
        :root {
            /* 主色调 - 使用更亮的蓝色，提高对比度和可读性 */
            --color-primary: #3B82F6;
            --color-primary-dark: #2563EB;
            --color-primary-light: #60A5FA;
            --color-primary-soft: rgba(59, 130, 246, 0.15);
            
            /* 辅助色 - 紫色系 */
            --color-secondary: #8B5CF6;
            --color-secondary-dark: #7C3AED;
            --color-secondary-light: #A78BFA;
            --color-secondary-soft: rgba(139, 92, 246, 0.15);
            
            /* 强调色 - 绿色系 */
            --color-accent: #10B981;
            --color-accent-dark: #059669;
            --color-accent-light: #34D399;
            --color-accent-soft: rgba(16, 185, 129, 0.15);
            
            /* 语义色 */
            --color-success: #10B981;
            --color-success-soft: rgba(16, 185, 129, 0.1);
            --color-danger: #EF4444;
            --color-danger-soft: rgba(239, 68, 68, 0.1);
            --color-warning: #F59E0B;
            --color-warning-soft: rgba(245, 158, 11, 0.1);
            --color-info: #3B82F6;
            --color-info-soft: rgba(59, 130, 246, 0.1);
            
            /* 文字颜色 - 提高对比度 */
            --color-text: #F1F5F9;
            --color-text-muted: #94A3B8;
            --color-text-dark: #64748B;
            --color-text-inverse: #0F172A;
            
            /* 背景颜色 - 使用蓝灰色调，更现代 */
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-surface-hover: #334155;
            --color-surface-active: #475569;
            
            /* 边框颜色 */
            --color-border: #334155;
            --color-border-light: #475569;
            --color-border-focus: #3B82F6;
            
            /* 阴影颜色 */
            --shadow-color: rgba(15, 23, 42, 0.5);
            --shadow-color-light: rgba(59, 130, 246, 0.2);
            
            /* 渐变背景 */
            --gradient-primary: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --gradient-secondary: linear-gradient(135deg, #10B981 0%, #3B82F6 100%);
            --gradient-dark: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* 页面容器 */
        .create-article {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 32px;
            padding: 24px;
            background: var(--color-surface);
            border-radius: 12px;
            border: 1px solid var(--color-border);
        }

        .page-title {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--color-text-muted);
            font-size: 1rem;
        }

        .article-form {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.95rem;
        }

        .form-group label .required {
            color: var(--color-danger);
            margin-left: 4px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            background: var(--color-background);
            color: var(--color-text);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px var(--color-primary-soft);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--color-text-muted);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-group textarea.content-editor {
            min-height: 500px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: flex-end;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--color-surface-hover);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--gradient-primary);
            border: none;
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-soft);
            color: var(--color-primary);
        }

        /* Error messages */
        .error-message {
            color: var(--color-danger);
            margin-top: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Tags input */
        .tags-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            border: 1px solid var(--color-border);
            background: var(--color-background);
            border-radius: 8px;
            min-height: 48px;
            align-items: center;
        }

        .tags-input-wrapper:focus-within {
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px var(--color-primary-soft);
        }

        .tag-input {
            flex: 1;
            min-width: 150px;
            border: none !important;
            background: transparent !important;
            padding: 8px !important;
            box-shadow: none !important;
        }

        .tag-input:focus {
            box-shadow: none !important;
        }

        .tag {
            background: var(--color-accent-soft);
            color: var(--color-accent);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-weight: 500;
        }

        .tag-remove {
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            transition: all 0.2s;
        }

        .tag-remove:hover {
            color: var(--color-danger);
            transform: scale(1.2);
        }

        /* Loading state */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Character count */
        .character-count {
            text-align: right;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        /* Form help text */
        .form-help {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Wiki Platform</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="articles.html" class="nav-link">文章</a>
                <a href="categories.html" class="nav-link">分类</a>
                <a href="metro.html" class="nav-link">地铁图</a>
                <a href="music.html" class="nav-link">音乐</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn">登录</a>
                <a href="register.html" class="btn btn-primary">注册</a>
            </div>
        </div>
    </nav>

    <!-- 创建文章 -->
    <div class="create-article">
        <div class="page-header">
            <h1 class="page-title">创建新文章</h1>
            <p class="page-subtitle">与社区分享您的知识和见解</p>
        </div>
        
        <form id="articleForm" class="article-form" novalidate>
            <!-- 标题 -->
            <div class="form-group">
                <label for="title">
                    文章标题
                    <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    placeholder="请输入文章标题" 
                    required
                    minlength="5"
                    maxlength="200"
                >
                <div id="titleError" class="error-message"></div>
                <div class="form-help">标题长度应为 5-200 个字符</div>
            </div>
            
            <!-- 摘要 -->
            <div class="form-group">
                <label for="summary">
                    摘要
                    <span class="required">*</span>
                </label>
                <textarea 
                    id="summary" 
                    name="summary" 
                    placeholder="简要概述文章的核心内容，帮助读者快速了解文章主题" 
                    required
                    minlength="20"
                    maxlength="500"
                    style="min-height: 120px;"
                ></textarea>
                <div id="summaryError" class="error-message"></div>
                <div class="character-count"><span id="summaryCount">0</span>/500</div>
                <div class="form-help">摘要长度应为 20-500 个字符</div>
            </div>
            
            <!-- 内容 -->
            <div class="form-group">
                <label for="content">
                    正文内容
                    <span class="required">*</span>
                </label>
                <textarea 
                    id="content" 
                    name="content" 
                    placeholder="在这里撰写文章正文内容... 支持 Markdown 语法" 
                    required
                    minlength="50"
                    class="content-editor"
                ></textarea>
                <div id="contentError" class="error-message"></div>
                <div class="character-count"><span id="contentCount">0</span></div>
                <div class="form-help">正文内容至少需要 50 个字符</div>
            </div>
            
            <!-- 分类和状态 -->
            <div class="form-row">
                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category" name="category">
                        <option value="">选择文章分类</option>
                        <option value="guides">指南</option>
                        <option value="tutorials">教程</option>
                        <option value="features">功能</option>
                        <option value="news">新闻</option>
                        <option value="opinions">观点</option>
                        <option value="others">其他</option>
                    </select>
                    <div class="form-help">选择最相关的分类</div>
                </div>
                <div class="form-group">
                    <label for="status">发布状态</label>
                    <select id="status" name="status">
                        <option value="published">立即发布</option>
                        <option value="draft">保存为草稿</option>
                    </select>
                    <div class="form-help">草稿仅自己可见</div>
                </div>
            </div>
            
            <!-- 标签 -->
            <div class="form-group">
                <label>标签</label>
                <div class="tags-input-wrapper">
                    <input 
                        type="text" 
                        class="tag-input" 
                        placeholder="添加标签后按回车" 
                        id="tagInput"
                        maxlength="30"
                    >
                </div>
                <div id="tagsContainer" class="tags-input" style="margin-top: 12px;"></div>
                <div class="form-help">添加 3-5 个标签有助于读者发现您的文章</div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="form-actions">
                <a href="articles.html" class="btn btn-secondary">
                    <span>取消</span>
                </a>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span>发布文章</span>
                </button>
            </div>
        </form>
    </div>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // DOM 元素
        const articleForm = document.getElementById('articleForm');
        const tagInput = document.getElementById('tagInput');
        const tagsContainer = document.getElementById('tagsContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const submitBtn = document.getElementById('submitBtn');
        const summaryTextarea = document.getElementById('summary');
        const contentTextarea = document.getElementById('content');
        const summaryCount = document.getElementById('summaryCount');
        const contentCount = document.getElementById('contentCount');
        
        // 状态
        let tags = [];
        let isSubmitting = false;

        // =====================================================================
        // 标签管理
        // =====================================================================

        // 添加标签
        tagInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tagName = tagInput.value.trim();
                if (tagName) {
                    addTag(tagName);
                    tagInput.value = '';
                }
            }
        });

        // 失去焦点时也添加标签
        tagInput.addEventListener('blur', () => {
            const tagName = tagInput.value.trim();
            if (tagName) {
                addTag(tagName);
                tagInput.value = '';
            }
        });

        function addTag(tagName) {
            // 验证标签格式
            if (tagName.length < 2) {
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.error('标签至少需要 2 个字符');
                } else {
                    alert('标签至少需要 2 个字符');
                }
                return;
            }

            // 检查是否已存在
            if (tags.includes(tagName.toLowerCase())) {
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.warning('该标签已存在');
                }
                return;
            }

            // 限制标签数量
            if (tags.length >= 10) {
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.warning('最多只能添加 10 个标签');
                } else {
                    alert('最多只能添加 10 个标签');
                }
                return;
            }

            // 添加到标签数组
            tags.push(tagName.toLowerCase());
            
            // 创建标签元素
            renderTags();
        }

        function removeTag(tagName) {
            const index = tags.indexOf(tagName);
            if (index > -1) {
                tags.splice(index, 1);
                renderTags();
            }
        }

        function renderTags() {
            tagsContainer.innerHTML = tags.map(tag => `
                <div class="tag">
                    <span>${tag}</span>
                    <span class="tag-remove" onclick="removeTag('${tag}')">×</span>
                </div>
            `).join('');
        }

        // =====================================================================
        // 字符计数
        // =====================================================================

        summaryTextarea.addEventListener('input', () => {
            summaryCount.textContent = summaryTextarea.value.length;
        });

        contentTextarea.addEventListener('input', () => {
            contentCount.textContent = contentTextarea.value.length;
        });

        // =====================================================================
        // 表单验证
        // =====================================================================

        function validateForm() {
            let isValid = true;
            
            // 验证标题
            const title = document.getElementById('title').value.trim();
            const titleError = document.getElementById('titleError');
            if (!title) {
                titleError.textContent = '请输入文章标题';
                titleError.classList.add('show');
                isValid = false;
            } else if (title.length < 5) {
                titleError.textContent = '标题至少需要 5 个字符';
                titleError.classList.add('show');
                isValid = false;
            } else {
                titleError.classList.remove('show');
            }

            // 验证摘要
            const summary = summaryTextarea.value.trim();
            const summaryError = document.getElementById('summaryError');
            if (!summary) {
                summaryError.textContent = '请输入文章摘要';
                summaryError.classList.add('show');
                isValid = false;
            } else if (summary.length < 20) {
                summaryError.textContent = '摘要至少需要 20 个字符';
                summaryError.classList.add('show');
                isValid = false;
            } else {
                summaryError.classList.remove('show');
            }

            // 验证内容
            const content = contentTextarea.value.trim();
            const contentError = document.getElementById('contentError');
            if (!content) {
                contentError.textContent = '请输入文章内容';
                contentError.classList.add('show');
                isValid = false;
            } else if (content.length < 50) {
                contentError.textContent = '正文至少需要 50 个字符';
                contentError.classList.add('show');
                isValid = false;
            } else {
                contentError.classList.remove('show');
            }

            return isValid;
        }

        // 清除错误提示
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
            });
        }

        // 实时验证输入
        document.getElementById('title').addEventListener('blur', function() {
            const title = this.value.trim();
            const titleError = document.getElementById('titleError');
            if (title && title.length < 5) {
                titleError.textContent = '标题至少需要 5 个字符';
                titleError.classList.add('show');
            } else {
                titleError.classList.remove('show');
            }
        });

        summaryTextarea.addEventListener('blur', function() {
            const summary = this.value.trim();
            const summaryError = document.getElementById('summaryError');
            if (summary && summary.length < 20) {
                summaryError.textContent = '摘要至少需要 20 个字符';
                summaryError.classList.add('show');
            } else {
                summaryError.classList.remove('show');
            }
        });

        contentTextarea.addEventListener('blur', function() {
            const content = this.value.trim();
            const contentError = document.getElementById('contentError');
            if (content && content.length < 50) {
                contentError.textContent = '正文至少需要 50 个字符';
                contentError.classList.add('show');
            } else {
                contentError.classList.remove('show');
            }
        });

        // =====================================================================
        // 表单提交 - 使用标准化 API 调用
        // =====================================================================

        articleForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 防止重复提交
            if (isSubmitting) {
                return;
            }

            // 清除之前的错误
            clearErrors();

            // 验证表单
            if (!validateForm()) {
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.error('请修正表单中的错误');
                }
                return;
            }

            // 获取表单数据
            const formData = {
                title: document.getElementById('title').value.trim(),
                content: contentTextarea.value.trim(),
                excerpt: summaryTextarea.value.trim(),
                category_id: document.getElementById('category').value || null,
                status: document.getElementById('status').value,
                tags: tags
            };

            // 开始提交
            isSubmitting = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>发布中...</span>';
            loadingOverlay.classList.add('show');

            try {
                // 使用标准化的 API 调用
                const result = await callAPI('POST', '/articles', {
                    body: formData,
                    requiresAuth: true
                });

                // 提交成功
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.success('文章发布成功！');
                } else {
                    alert('文章发布成功！');
                }

                // 延迟跳转到文章详情页
                setTimeout(() => {
                    const articleId = result.data?.id || result.id;
                    if (articleId) {
                        window.location.href = `article-detail.html?id=${articleId}`;
                    } else {
                        window.location.href = 'articles.html';
                    }
                }, 1000);

            } catch (error) {
                // 处理错误
                const errorInfo = handleAPIError(error);
                
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.error(errorInfo.message);
                } else {
                    alert('发布失败：' + errorInfo.message);
                }

                // 如果是认证错误，跳转到登录页
                if (errorInfo.status === 401 || errorInfo.errorCode === 'AUTH_REQUIRED') {
                    setTimeout(() => {
                        window.location.href = `login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
                    }, 2000);
                }

            } finally {
                // 恢复按钮状态
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>发布文章</span>';
                loadingOverlay.classList.remove('show');
            }
        });

        // =====================================================================
        // 页面加载时检查认证状态
        // =====================================================================

        document.addEventListener('DOMContentLoaded', async () => {
            // 检查用户是否已登录
            const auth = authManager.getAuth();
            if (!auth.token) {
                // 未登录，提示用户
                if (typeof notificationManager !== 'undefined') {
                    notificationManager.warning('请先登录后再创建文章');
                }
                
                // 延迟跳转到登录页
                setTimeout(() => {
                    window.location.href = `login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
                }, 2000);
            }
        });
    </script>
</body>
</html>
