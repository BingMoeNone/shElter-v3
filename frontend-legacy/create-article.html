<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Platform - Create Article</title>
    <style>
        /* Global Styles */
        :root {
            --color-primary: #00ff88;
            --color-secondary: #00d4ff;
            --color-accent: #ff6b6b;
            --color-text: #ffffff;
            --color-text-muted: #aaaaaa;
            --color-background: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-border: #333333;
            --font-family-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-family-heading: 'Arial', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-primary);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            color: var(--color-primary);
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--color-text);
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--color-primary);
            text-shadow: 0 0 5px var(--color-primary);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--color-primary);
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--color-primary);
            color: #000;
        }

        /* Create Article Styles */
        .create-article {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
        }

        .page-subtitle {
            color: var(--color-text-muted);
            font-size: 1.1rem;
        }

        .article-form {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            background: rgba(0, 0, 0, 0.5);
            color: var(--color-text);
            border-radius: 4px;
            font-size: 16px;
            font-family: var(--font-family-base);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 300px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: flex-end;
        }

        .btn-primary {
            padding: 12px 24px;
            background: var(--color-primary);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px var(--color-primary);
        }

        .btn-secondary {
            padding: 12px 24px;
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: var(--color-primary);
            color: #000;
        }

        /* Error messages */
        .error-message {
            color: #ff4444;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Tags input */
        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .tag-input {
            flex: 1;
            min-width: 200px;
        }

        .tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag-remove {
            cursor: pointer;
            font-weight: bold;
        }

        .tag-remove:hover {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Wiki Platform</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="articles.html" class="nav-link">Articles</a>
                <a href="categories.html" class="nav-link">Categories</a>
                <a href="metro.html" class="nav-link">Metro</a>
                <a href="music.html" class="nav-link">Music</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn">Login</a>
                <a href="register.html" class="btn">Register</a>
            </div>
        </div>
    </nav>

    <!-- Create Article Content -->
    <div class="create-article">
        <div class="page-header">
            <h1 class="page-title">Create New Article</h1>
            <p class="page-subtitle">Share your knowledge with the community</p>
        </div>
        
        <form id="articleForm" class="article-form">
            <!-- Title -->
            <div class="form-group">
                <label for="title">Article Title *</label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    placeholder="Enter your article title" 
                    required
                >
                <div id="titleError" class="error-message"></div>
            </div>
            
            <!-- Summary -->
            <div class="form-group">
                <label for="summary">Summary *</label>
                <textarea 
                    id="summary" 
                    name="summary" 
                    placeholder="Write a brief summary of your article" 
                    required
                    style="min-height: 120px;"
                ></textarea>
                <div id="summaryError" class="error-message"></div>
            </div>
            
            <!-- Content -->
            <div class="form-group">
                <label for="content">Content *</label>
                <textarea 
                    id="content" 
                    name="content" 
                    placeholder="Write your article content here..." 
                    required
                    style="min-height: 500px;"
                ></textarea>
                <div id="contentError" class="error-message"></div>
            </div>
            
            <!-- Status and Category -->
            <div class="form-row">
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); background: rgba(0, 0, 0, 0.5); color: var(--color-text); border-radius: 4px; font-size: 16px;">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); background: rgba(0, 0, 0, 0.5); color: var(--color-text); border-radius: 4px; font-size: 16px;">
                        <option value="">Select a category</option>
                        <option value="guides">Guides</option>
                        <option value="tutorials">Tutorials</option>
                        <option value="features">Features</option>
                        <option value="news">News</option>
                    </select>
                </div>
            </div>
            
            <!-- Tags -->
            <div class="form-group">
                <label>Tags</label>
                <div class="tags-input">
                    <input 
                        type="text" 
                        class="tag-input" 
                        placeholder="Add a tag..." 
                        id="tagInput"
                    >
                </div>
                <div id="tagsContainer" class="tags-input" style="margin-top: 12px;"></div>
            </div>
            
            <!-- Actions -->
            <div class="form-actions">
                <a href="articles.html" class="btn-secondary">Cancel</a>
                <button type="submit" class="btn-primary">Publish Article</button>
            </div>
        </form>
    </div>

    <script>
        // DOM Elements
        const articleForm = document.getElementById('articleForm');
        const tagInput = document.getElementById('tagInput');
        const tagsContainer = document.getElementById('tagsContainer');
        
        // State
        const tags = [];

        // Initialize tags input
        tagInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && tagInput.value.trim()) {
                e.preventDefault();
                addTag(tagInput.value.trim());
                tagInput.value = '';
            }
        });

        // Add tag
        function addTag(tagName) {
            // Check if tag already exists
            if (tags.includes(tagName)) return;
            
            // Add to tags array
            tags.push(tagName);
            
            // Create tag element
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `
                <span>${tagName}</span>
                <span class="tag-remove" onclick="removeTag('${tagName}')">脳</span>
            `;
            
            // Add to container
            tagsContainer.appendChild(tagElement);
        }

        // Remove tag
        function removeTag(tagName) {
            // Remove from tags array
            const index = tags.indexOf(tagName);
            if (index > -1) {
                tags.splice(index, 1);
            }
            
            // Remove from DOM
            const tagElements = tagsContainer.querySelectorAll('.tag');
            tagElements.forEach(tagEl => {
                if (tagEl.textContent.startsWith(tagName)) {
                    tagEl.remove();
                }
            });
        }

        // Handle form submission
        articleForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(articleForm);
            
            // Add tags to form data
            formData.append('tags', JSON.stringify(tags));
            
            // Simulate API call
            const submitButton = e.target.querySelector('.btn-primary');
            const originalText = submitButton.textContent;
            submitButton.textContent = 'Publishing...';
            submitButton.disabled = true;
            
            setTimeout(() => {
                // Reset button
                submitButton.textContent = originalText;
                submitButton.disabled = false;
                
                // Redirect to articles list
                window.location.href = 'articles.html';
            }, 1500);
        });
    </script>
</body>
</html>
