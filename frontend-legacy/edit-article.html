<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缂栬緫鏂囩珷</title>
    <!-- 寮曞叆Quill瀵屾枃鏈紪杈戝櫒 -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
    <style>
        :root {
            --color-primary: #00ff9d;
            --color-text: #fff;
            --color-text-muted: #aaa;
            --color-surface: #1a1a1a;
            --color-surface-hover: #2a2a2a;
            --color-border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: var(--color-text);
            line-height: 1.6;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .edit-article-page {
            max-width: 800px;
            margin: 0 auto;
        }

        .edit-article-page h1 {
            margin-bottom: 24px;
            color: var(--color-primary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--color-text-muted);
        }

        .article-form {
            max-width: 800px;
            background: var(--color-surface);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--color-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
            border-radius: 4px;
            font-size: 14px;
            color: var(--color-text);
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
            outline: none;
        }

        /* 瀵屾枃鏈紪杈戝櫒鏍峰紡 */
        .rich-text-editor {
            min-height: 400px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
        }

        .rich-text-editor .ql-container {
            font-family: inherit;
            color: var(--color-text);
            min-height: 300px;
        }

        .rich-text-editor .ql-editor {
            font-size: 14px;
            line-height: 1.6;
        }

        .rich-text-editor .ql-toolbar {
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--color-border);
        }

        .rich-text-editor .ql-toolbar button:hover,
        .rich-text-editor .ql-toolbar .ql-picker-label:hover {
            color: var(--color-primary);
        }

        /* 閿欒娑堟伅鏍峰紡 */
        .error-message {
            color: #ff4444;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 4px;
            border-left: 3px solid #ff4444;
        }

        /* 琛ㄥ崟鎿嶄綔鎸夐挳鏍峰紡 */
        .form-actions {
            display: flex;
            gap: 12px;
        }

        .btn-save {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-text);
            border: 1px solid var(--color-border);
            padding: 10px 20px;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-publish {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
            padding: 10px 20px;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-save:hover:not(:disabled) {
            background: var(--color-surface-hover);
            border-color: var(--color-text);
        }

        .btn-publish:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 15px var(--color-primary);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <h1>缂栬緫鏂囩珷</h1>
        <nav>
            <ul>
                <li><a href="index.html">棣栭〉</a></li>
                <li><a href="articles.html">鏂囩珷</a></li>
                <li><a href="profile.html">涓汉璧勬枡</a></li>
                <li><a href="login.html">鐧诲綍</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="edit-article-page">
            <div id="loading" class="loading">鍔犺浇鏂囩珷涓?..</div>
            
            <div id="articleForm" class="article-form" style="display: none;">
                <h1 id="articleTitle">缂栬緫鏂囩珷</h1>
                
                <form id="editForm">
                    <div class="form-group">
                        <label for="title">鏍囬</label>
                        <input
                            id="title"
                            type="text"
                            placeholder="杈撳叆鏂囩珷鏍囬"
                            required
                            maxlength="200"
                        />
                    </div>
                    
                    <div class="form-group">
                        <label for="summary">鎽樿 (鍙€?</label>
                        <input
                            id="summary"
                            type="text"
                            placeholder="鏂囩珷鎽樿"
                            maxlength="500"
                        />
                    </div>
                    
                    <div class="form-group">
                        <label for="content">鍐呭</label>
                        <div id="content" class="rich-text-editor"></div>
                        <input type="hidden" id="contentHidden">
                    </div>
                    
                    <div class="form-group">
                        <label for="tags">鏍囩 (閫楀彿鍒嗛殧)</label>
                        <input
                            id="tags"
                            type="text"
                            placeholder="tag1, tag2, tag3"
                        />
                    </div>
                    
                    <div id="error" class="error-message" style="display: none;"></div>
                    
                    <div class="form-actions">
                        <button type="submit" id="saveDraftBtn" class="btn-save" disabled>
                            淇濆瓨鑽夌
                        </button>
                        <button type="button" id="publishBtn" class="btn-publish" disabled>
                            鍙戝竷
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 妯℃嫙鏂囩珷鏁版嵁
        const mockArticle = {
            id: 1,
            title: "FastAPI鍚庣寮€鍙戞渶浣冲疄璺?,
            content: "<h2>FastAPI绠€浠?/h2><p>FastAPI鏄竴涓幇浠ｅ寲鐨凱ython Web妗嗘灦...</p>",
            summary: "鏈枃浠嬬粛浜嗕娇鐢‵astAPI寮€鍙戝悗绔簲鐢ㄧ殑鏈€浣冲疄璺?..",
            author: { id: 1, username: "admin" },
            tags: [{ name: "fastapi" }, { name: "python" }, { name: "backend" }],
            status: "published",
            created_at: "2023-01-15T10:30:00Z",
            updated_at: "2023-01-15T14:45:00Z"
        };

        // 妯℃嫙鐢ㄦ埛鏁版嵁
        const mockUser = {
            id: 1,
            username: "admin",
            email: "admin@example.com",
            role: "admin"
        };

        // 鐘舵€佺鐞?        let article = null;
        let loading = true;
        let saving = false;
        let error = null;
        let quillEditor = null;

        // 椤甸潰鍔犺浇鏃跺垵濮嬪寲
        document.addEventListener('DOMContentLoaded', function() {
            // 鍒濆鍖栧瘜鏂囨湰缂栬緫鍣?            initQuillEditor();
            
            // 缁戝畾浜嬩欢鐩戝惉鍣?            bindEventListeners();
            
            // 鑾峰彇鏂囩珷鏁版嵁
            fetchArticle();
        });

        // 鍒濆鍖栧瘜鏂囨湰缂栬緫鍣?        function initQuillEditor() {
            quillEditor = new Quill('#content', {
                theme: 'snow',
                modules: {
                    toolbar: {
                        container: [
                            [{ header: [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ list: 'ordered' }, { list: 'bullet' }],
                            [{ indent: '-1' }, { indent: '+1' }],
                            [{ align: [] }],
                            ['link', 'image'],
                            ['clean']
                        ]
                    }
                },
                placeholder: '鍦ㄨ繖閲屾挵鍐欎綘鐨勬枃绔犲唴瀹?..',
                readOnly: false
            });

            // 鐩戝惉鍐呭鍙樺寲锛屾洿鏂伴殣钘忚緭鍏ユ
            quillEditor.on('text-change', function() {
                updateContentHidden();
                checkCanSubmit();
            });
        }

        // 鏇存柊闅愯棌鐨勫唴瀹硅緭鍏ユ
        function updateContentHidden() {
            const content = quillEditor.root.innerHTML;
            document.getElementById('contentHidden').value = content;
        }

        // 缁戝畾浜嬩欢鐩戝惉鍣?        function bindEventListeners() {
            const titleInput = document.getElementById('title');
            const saveDraftBtn = document.getElementById('saveDraftBtn');
            const publishBtn = document.getElementById('publishBtn');
            const editForm = document.getElementById('editForm');

            // 鏍囬杈撳叆鍙樺寲鏃舵鏌ユ槸鍚﹀彲浠ユ彁浜?            titleInput.addEventListener('input', checkCanSubmit);

            // 淇濆瓨鑽夌
            editForm.addEventListener('submit', function(e) {
                e.preventDefault();
                handleSubmit(false);
            });

            // 鍙戝竷鏂囩珷
            publishBtn.addEventListener('click', function() {
                handleSubmit(true);
            });
        }

        // 妫€鏌ユ槸鍚﹀彲浠ユ彁浜?        function checkCanSubmit() {
            const title = document.getElementById('title').value.trim();
            const content = quillEditor.root.innerHTML;
            const plainContent = quillEditor.getText().trim();
            const canSubmit = title && plainContent.length >= 10;
            
            document.getElementById('saveDraftBtn').disabled = !canSubmit || saving;
            document.getElementById('publishBtn').disabled = !canSubmit || saving;
        }

        // 鑾峰彇鏂囩珷鏁版嵁
        function fetchArticle() {
            loading = true;
            updateUI();
            
            // 妯℃嫙API璇锋眰寤惰繜
            setTimeout(() => {
                try {
                    // 妯℃嫙鑾峰彇鏂囩珷
                    article = mockArticle;
                    
                    // 妫€鏌ユ潈闄?                    const hasPermission = article.author.id === mockUser.id || mockUser.role === 'admin';
                    
                    if (!hasPermission) {
                        // 娌℃湁鏉冮檺锛岄噸瀹氬悜鍒版枃绔犺鎯呴〉
                        window.location.href = `article-detail.html?id=${article.id}`;
                        return;
                    }
                    
                    // 濉厖琛ㄥ崟鏁版嵁
                    fillFormData();
                } catch (err) {
                    console.error('Failed to fetch article:', err);
                    error = '鍔犺浇鏂囩珷澶辫触';
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 800);
        }

        // 濉厖琛ㄥ崟鏁版嵁
        function fillFormData() {
            document.getElementById('articleTitle').textContent = `缂栬緫鏂囩珷: ${article.title}`;
            document.getElementById('title').value = article.title;
            document.getElementById('summary').value = article.summary;
            
            // 璁剧疆瀵屾枃鏈紪杈戝櫒鍐呭
            quillEditor.root.innerHTML = article.content;
            updateContentHidden();
            
            // 璁剧疆鏍囩
            const tagNames = article.tags.map(tag => tag.name).join(', ');
            document.getElementById('tags').value = tagNames;
            
            // 妫€鏌ユ槸鍚﹀彲浠ユ彁浜?            checkCanSubmit();
        }

        // 鏇存柊UI
        function updateUI() {
            const loadingElement = document.getElementById('loading');
            const articleFormElement = document.getElementById('articleForm');
            const errorElement = document.getElementById('error');
            
            if (loading) {
                loadingElement.style.display = 'block';
                articleFormElement.style.display = 'none';
            } else if (error) {
                loadingElement.style.display = 'none';
                articleFormElement.style.display = 'block';
                errorElement.textContent = error;
                errorElement.style.display = 'block';
            } else {
                loadingElement.style.display = 'none';
                articleFormElement.style.display = 'block';
                errorElement.style.display = 'none';
            }
        }

        // 澶勭悊鎻愪氦
        function handleSubmit(publish = false) {
            const title = document.getElementById('title').value.trim();
            const summary = document.getElementById('summary').value.trim();
            const content = document.getElementById('contentHidden').value;
            const tagNames = document.getElementById('tags').value;
            
            // 琛ㄥ崟楠岃瘉
            if (!title || quillEditor.getText().trim().length < 10) {
                return;
            }
            
            saving = true;
            error = null;
            updateUI();
            
            // 鏇存柊鎸夐挳鐘舵€?            document.getElementById('saveDraftBtn').textContent = '淇濆瓨涓?..';
            document.getElementById('publishBtn').textContent = '鍙戝竷涓?..';
            
            // 妯℃嫙API璇锋眰寤惰繜
            setTimeout(() => {
                try {
                    // 妯℃嫙API鍝嶅簲
                    console.log('淇濆瓨鏂囩珷:', {
                        id: article.id,
                        title,
                        summary,
                        content,
                        tagNames: tagNames.split(',').map(t => t.trim()).filter(Boolean),
                        status: publish ? 'published' : 'draft'
                    });
                    
                    // 淇濆瓨鎴愬姛锛岄噸瀹氬悜鍒版枃绔犺鎯呴〉
                    window.location.href = `article-detail.html?id=${article.id}`;
                } catch (err) {
                    console.error('Failed to save article:', err);
                    error = '淇濆瓨鏂囩珷澶辫触锛岃閲嶈瘯';
                } finally {
                    saving = false;
                    updateUI();
                    
                    // 鎭㈠鎸夐挳鏂囨湰
                    document.getElementById('saveDraftBtn').textContent = '淇濆瓨鑽夌';
                    document.getElementById('publishBtn').textContent = '鍙戝竷';
                }
            }, 1500);
        }
    </script>
</body>
</html>
