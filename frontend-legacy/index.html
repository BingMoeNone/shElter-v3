<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Platform</title>
    <script src="utils.js"></script>
    <style>
        /* 鍩虹鏍峰紡 */
        :root {
            --color-primary: #00ff9d;
            --color-secondary: #00ccff;
            --color-accent: #ff6b6b;
            --color-text: #ffffff;
            --color-text-muted: #b0b0b0;
            --color-background: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* 椤甸潰瀹瑰櫒 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 棣栭〉 */
        .home {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 鑻遍泟鍖哄煙 */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 157, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%);
            border: 1px solid var(--color-primary);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.1);
            color: var(--color-text);
            border-radius: 8px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--color-primary);
            box-shadow: 0 0 10px var(--color-primary);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 32px;
            color: var(--color-text-muted);
        }

        /* 鎼滅储鍖哄煙 */
        .search-section {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-section input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--color-primary);
            background: rgba(0, 0, 0, 0.5);
            color: var(--color-text);
            border-radius: 4px;
            font-size: 16px;
        }

        .search-section input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--color-primary);
        }

        .search-section button {
            padding: 12px 24px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            font-weight: 600;
            transition: all 0.3s;
            border-radius: 4px;
            cursor: pointer;
        }

        .search-section button:hover {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 15px var(--color-primary);
        }

        /* 鐗硅壊鏂囩珷 */
        .featured-articles h2 {
            margin-bottom: 24px;
            color: var(--color-secondary);
            text-shadow: 0 0 5px var(--color-secondary);
        }

        /* 鍔犺浇鐘舵€?*/
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--color-text-muted);
            border: 1px dashed var(--color-text-muted);
            border-radius: 8px;
        }

        /* 鏃犳枃绔犵姸鎬?*/
        .no-articles {
            text-align: center;
            padding: 40px;
            color: var(--color-text-muted);
            border: 1px dashed var(--color-text-muted);
            border-radius: 8px;
        }

        .no-articles a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .no-articles a:hover {
            text-shadow: 0 0 5px var(--color-primary);
        }

        /* 鏂囩珷缃戞牸 */
        .articles-grid {
            display: grid;
            gap: 20px;
        }

        /* 鏌ョ湅鍏ㄩ儴閾炬帴 */
        .view-all {
            display: inline-block;
            margin-top: 24px;
            font-weight: 500;
            color: var(--color-accent);
            text-decoration: none;
        }

        .view-all:hover {
            color: var(--color-primary);
            text-shadow: 0 0 5px var(--color-primary);
        }

        /* 鏂囩珷鍗＄墖 */
        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .article-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.1);
        }

        .article-card h3 {
            margin-bottom: 8px;
            color: var(--color-primary);
        }

        .article-card .article-meta {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .article-card .article-excerpt {
            color: var(--color-text);
            margin-bottom: 16px;
        }

        .article-card .article-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .article-card .tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* 鍝嶅簲寮忚璁?*/
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .search-section {
                flex-direction: column;
                max-width: 100%;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 闈㈠寘灞戝鑸?-->
        <div id="breadcrumb" class="breadcrumb"></div>
        
        <!-- 鐧诲綍鐘舵€佹寚绀哄櫒 -->
        <div style="text-align: right; margin-bottom: 16px;">
            <div id="auth-indicator" class="auth-indicator"></div>
        </div>
        
        <div class="home">
            <!-- 鑻遍泟鍖哄煙 -->
            <section class="hero">
                <h1>Welcome to Wiki Platform</h1>
                <p>A collaborative platform for sharing knowledge and building communities.</p>
                
                <div class="search-section">
                    <input
                        id="search-input"
                        type="search"
                        placeholder="Search articles..."
                    />
                    <button id="search-btn">Search</button>
                </div>
            </section>
            
            <!-- 鐗硅壊鏂囩珷 -->
            <section class="featured-articles">
                <h2>Latest Articles</h2>
                
                <!-- 鍔犺浇鐘舵€?-->
                <div id="loading" class="loading" style="display: block;">
                    Loading articles...
                </div>
                
                <!-- 鏃犳枃绔犵姸鎬?-->
                <div id="no-articles" class="no-articles" style="display: none;">
                    No articles found. Be the first to <a href="create-article.html">create one</a>!
                </div>
                
                <!-- 鏂囩珷鍒楄〃 -->
                <div id="articles-grid" class="articles-grid" style="display: none;"></div>
                
                <!-- 鏌ョ湅鍏ㄩ儴閾炬帴 -->
                <a href="articles.html" class="view-all">
                    View All Articles 鈫?                </a>
            </section>
        </div>
    </div>

    <script>
        // 妯℃嫙鏁版嵁
        const mockArticles = [
            {
                id: 1,
                title: 'Welcome to Wiki Platform',
                content: 'This is the first article on our Wiki Platform. We hope you enjoy your stay!',
                createdAt: '2024-01-01',
                updatedAt: '2024-01-01',
                author: 'admin',
                tags: ['welcome', 'introduction']
            },
            {
                id: 2,
                title: 'Getting Started Guide',
                content: 'A comprehensive guide to help you get started with our platform.',
                createdAt: '2024-01-02',
                updatedAt: '2024-01-02',
                author: 'admin',
                tags: ['guide', 'getting-started']
            },
            {
                id: 3,
                title: 'Advanced Features',
                content: 'Learn about the advanced features of our platform.',
                createdAt: '2024-01-03',
                updatedAt: '2024-01-03',
                author: 'admin',
                tags: ['advanced', 'features']
            },
            {
                id: 4,
                title: 'Community Guidelines',
                content: 'Please read our community guidelines before participating.',
                createdAt: '2024-01-04',
                updatedAt: '2024-01-04',
                author: 'admin',
                tags: ['guidelines', 'community']
            },
            {
                id: 5,
                title: 'Contribution Tips',
                content: 'Tips for contributing to our platform.',
                createdAt: '2024-01-05',
                updatedAt: '2024-01-05',
                author: 'admin',
                tags: ['contribution', 'tips']
            }
        ];

        // DOM 鍏冪礌
        const searchInputEl = document.getElementById('search-input');
        const searchBtnEl = document.getElementById('search-btn');
        const loadingEl = document.getElementById('loading');
        const noArticlesEl = document.getElementById('no-articles');
        const articlesGridEl = document.getElementById('articles-grid');

        // 鏂囩珷鐘舵€?        let articles = [];
        let loading = true;

        // 妯℃嫙API璋冪敤
        async function fetchArticles(params = {}) {
            loading = true;
            
            // 鏄剧ず鍔犺浇鐘舵€?            loadingEl.style.display = 'block';
            noArticlesEl.style.display = 'none';
            articlesGridEl.style.display = 'none';
            
            try {
                // 妯℃嫙缃戠粶寤惰繜
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                let filteredArticles = [...mockArticles];
                
                // 鎼滅储杩囨护
                if (params.search) {
                    const searchLower = params.search.toLowerCase();
                    filteredArticles = filteredArticles.filter(article => 
                        article.title.toLowerCase().includes(searchLower) ||
                        article.content.toLowerCase().includes(searchLower)
                    );
                }
                
                // 闄愬埗鏁伴噺
                if (params.limit) {
                    filteredArticles = filteredArticles.slice(0, params.limit);
                }
                
                articles = filteredArticles;
                
                // 娓叉煋鏂囩珷
                renderArticles();
                
                // 鏄剧ず鏂囩珷鍒楄〃鎴栨棤鏂囩珷鐘舵€?                if (articles.length === 0) {
                    loadingEl.style.display = 'none';
                    noArticlesEl.style.display = 'block';
                } else {
                    loadingEl.style.display = 'none';
                    articlesGridEl.style.display = 'grid';
                }
            } catch (err) {
                console.error('Failed to fetch articles:', err);
                loadingEl.style.display = 'none';
                noArticlesEl.style.display = 'block';
            } finally {
                loading = false;
            }
        }

        // 娓叉煋鏂囩珷鍒楄〃
        function renderArticles() {
            if (articles.length === 0) return;
            
            let articlesHtml = '';
            articles.forEach(article => {
                articlesHtml += `
                    <div class="article-card">
                        <h3>${article.title}</h3>
                        <div class="article-meta">
                            ${article.createdAt} 鈥?${article.author}
                        </div>
                        <div class="article-excerpt">${article.content}</div>
                        <div class="article-tags">
                            ${article.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
            
            articlesGridEl.innerHTML = articlesHtml;
        }

        // 澶勭悊鎼滅储
        function handleSearch() {
            const searchQuery = searchInputEl.value;
            fetchArticles({ search: searchQuery, limit: 10 });
        }

        // 鍒濆鍖?        document.addEventListener('DOMContentLoaded', () => {
            // 鍒濆鍖栭〉闈紭鍖栧姛鑳?            initPage('home', '棣栭〉');
            
            fetchArticles({ limit: 10 });
            
            // 娣诲姞浜嬩欢鐩戝惉鍣?            searchBtnEl.addEventListener('click', handleSearch);
            searchInputEl.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
        });
    </script>
</body>
</html>
