<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Platform</title>
    <script src="utils.js"></script>
    <style>
        /* 配色方案 */
        :root {
            --color-primary: #00ff9d;
            --color-secondary: #00ccff;
            --color-accent: #ff6b6b;
            --color-text: #ffffff;
            --color-text-muted: #b0b0b0;
            --color-background: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* 页面容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 首页 */
        .home {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 英雄区域 */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--color-text-muted);
            margin-bottom: 30px;
        }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: var(--color-background);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 157, 0.3);
        }

        /* 导航栏 */
        nav {
            background-color: var(--color-surface);
            padding: 1rem 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--color-border);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        nav h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        nav h1 a {
            color: var(--color-primary);
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0;
        }

        nav ul li a {
            color: var(--color-text);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--color-primary);
        }

        /* 功能卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature-card {
            background-color: var(--color-surface);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-color: var(--color-primary);
        }

        .feature-card h3 {
            color: var(--color-primary);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        /* 最近更新 */
        .recent-updates {
            background-color: var(--color-surface);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--color-border);
        }

        .recent-updates h2 {
            margin-bottom: 20px;
            color: var(--color-primary);
        }

        .article-list {
            list-style: none;
        }

        .article-list li {
            padding: 15px 0;
            border-bottom: 1px solid var(--color-border);
        }

        .article-list li:last-child {
            border-bottom: none;
        }

        .article-list a {
            color: var(--color-text);
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s ease;
        }

        .article-list a:hover {
            color: var(--color-primary);
        }

        .article-date {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        /* 页脚 */
        footer {
            background-color: var(--color-surface);
            color: var(--color-text-muted);
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 1px solid var(--color-border);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="container">
            <h1><a href="index.html">Wiki Platform</a></h1>
            <ul>
                <li><a href="articles.html">文章</a></li>
                <li><a href="categories.html">分类</a></li>
                <li><a href="search.html">搜索</a></li>
                <li><a href="login.html">登录</a></li>
                <li><a href="register.html">注册</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="container home">
        <!-- 英雄区域 -->
        <section class="hero">
            <h1>Welcome to Wiki Platform</h1>
            <p>一个现代化的知识库平台，让知识分享更简单</p>
            <a href="articles.html" class="btn">浏览文章</a>
        </section>

        <!-- 功能介绍 -->
        <section class="features">
            <div class="feature-card">
                <h3>丰富的内容</h3>
                <p>包含各种主题的高质量文章，涵盖技术、科学、文化等多个领域</p>
            </div>
            <div class="feature-card">
                <h3>轻松搜索</h3>
                <p>强大的搜索功能，帮助你快速找到所需信息</p>
            </div>
            <div class="feature-card">
                <h3>社区驱动</h3>
                <p>支持用户贡献内容，共同构建知识生态系统</p>
            </div>
        </section>

        <!-- 最近更新 -->
        <section class="recent-updates">
            <h2>最近更新</h2>
            <ul class="article-list" id="recent-articles">
                <!-- 动态内容将通过JavaScript加载 -->
                <li>正在加载...</li>
            </ul>
        </section>
    </main>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2024 Wiki Platform. All rights reserved.</p>
    </footer>

    <script>
        // 页面加载时获取最近更新的文章
        document.addEventListener('DOMContentLoaded', function() {
            fetchRecentArticles();
        });

        async function fetchRecentArticles() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/articles?limit=5&sort_by=created_at&order=desc');
                const data = await response.json();
                
                const articleList = document.getElementById('recent-articles');
                articleList.innerHTML = '';
                
                if (data.articles && data.articles.length > 0) {
                    data.articles.forEach(article => {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = `article-detail.html?id=${article.id}`;
                        
                        const titleSpan = document.createElement('span');
                        titleSpan.textContent = article.title;
                        
                        const dateSpan = document.createElement('span');
                        dateSpan.className = 'article-date';
                        dateSpan.textContent = new Date(article.created_at).toLocaleDateString();
                        
                        a.appendChild(titleSpan);
                        a.appendChild(dateSpan);
                        li.appendChild(a);
                        articleList.appendChild(li);
                    });
                } else {
                    articleList.innerHTML = '<li>暂无文章</li>';
                }
            } catch (error) {
                console.error('Failed to fetch recent articles:', error);
                document.getElementById('recent-articles').innerHTML = '<li>加载失败，请稍后重试</li>';
            }
        }
    </script>
</body>
</html>
