<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Platform - Login</title>
    <style>
        /* Global Styles */
        :root {
            --color-primary: #00ff88;
            --color-secondary: #00d4ff;
            --color-accent: #ff6b6b;
            --color-text: #ffffff;
            --color-text-muted: #aaaaaa;
            --color-background: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-border: #333333;
            --font-family-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-family-heading: 'Arial', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '寰蒋闆呴粦', SimHei, '榛戜綋', sans-serif;\n            background-color: var(--color-background);\n            color: var(--color-text);\n            line-height: 1.6;\n        }

        /* Navigation */
        nav {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-primary);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            color: var(--color-primary);
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--color-text);
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--color-primary);
            text-shadow: 0 0 5px var(--color-primary);
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--color-primary);
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--color-primary);
            color: #000;
        }

        /* Login Page Styles */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--color-surface);
            border: 1px solid var(--color-primary);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.1);
            padding: 32px;
            border-radius: 8px;
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-text);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            background: rgba(0, 0, 0, 0.5);
            color: var(--color-text);
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }

        .error-message {
            color: #ff4444;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 4px;
            border-left: 3px solid #ff4444;
        }

        .error-title {
            margin: 0 0 8px 0;
            font-weight: 500;
        }

        .error-suggestion {
            margin: 0;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .success-message {
            color: var(--color-primary);
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(0, 255, 157, 0.1);
            border-radius: 4px;
            border-left: 3px solid var(--color-primary);
            text-align: center;
            font-weight: bold;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 10px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 20px var(--color-primary);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: var(--color-text-muted);
        }

        .register-link a {
            color: var(--color-primary);
            font-weight: bold;
            text-decoration: none;
        }

        .register-link a:hover {
            text-shadow: 0 0 5px var(--color-primary);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Wiki Platform</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="articles.html" class="nav-link">Articles</a>
                <a href="categories.html" class="nav-link">Categories</a>
                <a href="metro.html" class="nav-link">Metro</a>
                <a href="music.html" class="nav-link">Music</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn">Login</a>
                <a href="register.html" class="btn">Register</a>
            </div>
        </div>
    </nav>

    <!-- Login Page Content -->
    <div class="login-page">
        <div class="login-card">
            <h1>鐧诲綍</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">鐢ㄦ埛鍚?/label>
                    <input
                        id="username"
                        type="text"
                        required
                        autofocus
                        placeholder="璇疯緭鍏ョ敤鎴峰悕"
                    />
                </div>
                
                <div class="form-group">
                    <label for="email">閭</label>
                    <input
                        id="email"
                        type="email"
                        required
                        placeholder="璇疯緭鍏ユ敞鍐屾椂浣跨敤鐨勯偖绠?
                    />
                </div>
                
                <div class="form-group">
                    <label for="password">瀵嗙爜</label>
                    <input
                        id="password"
                        type="password"
                        required
                        placeholder="璇疯緭鍏ュ瘑鐮?
                    />
                </div>
                
                <div id="successMessage" class="success-message" style="display: none;">
                    <p id="successText"></p>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;">
                    <p id="errorTitle" class="error-title"></p>
                    <p id="errorSuggestion" class="error-suggestion"></p>
                </div>
                
                <button type="submit" id="loginButton" class="btn-login">
                    鐧诲綍
                </button>
            </form>
            
            <p class="register-link">
                杩樻病鏈夎处鎴凤紵 <a href="register.html">绔嬪嵆娉ㄥ唽</a>
            </p>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const errorMessage = document.getElementById('errorMessage');
        const errorTitle = document.getElementById('errorTitle');
        const errorSuggestion = document.getElementById('errorSuggestion');

        // Mock login function
        function mockLogin(username, email, password) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // Simulate login logic
                    if (username && email && password) {
                        // Simulate successful login
                        resolve({ success: true });
                    } else {
                        // Simulate login failure
                        reject({ 
                            response: { 
                                data: { 
                                    detail: { 
                                        message: '鐧诲綍澶辫触锛岃妫€鏌ヨ緭鍏ョ殑鐢ㄦ埛鍚嶃€侀偖绠卞拰瀵嗙爜',
                                        suggestion: '璇风‘淇濇墍鏈夊瓧娈甸兘宸插～鍐欐纭紝鐢ㄦ埛鍚嶅拰瀵嗙爜鍖哄垎澶у皬鍐? 
                                    } 
                                } 
                            } 
                        });
                    }
                }, 1500);
            });
        }

        // Handle login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            // Reset messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Update button state
            loginButton.textContent = '鐧诲綍涓?..';
            loginButton.disabled = true;
            
            try {
                // Call mock login function
                await mockLogin(username, email, password);
                
                // Show success message
                successText.textContent = '鐧诲綍鎴愬姛锛佹杩庡洖鏉ャ€?;
                successMessage.style.display = 'block';
                
                // Reset form inputs except username
                passwordInput.value = '';
                
                // Redirect after a short delay
                setTimeout(() => {
                    // Get redirect URL from query parameter
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    
                    if (redirect && redirect !== '/login' && !redirect.startsWith('/admin')) {
                        window.location.href = redirect;
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } catch (err) {
                // Show error message
                passwordInput.value = '';
                
                const response = err.response?.data;
                if (response?.detail) {
                    if (typeof response.detail === 'string') {
                        errorTitle.textContent = response.detail;
                        errorSuggestion.textContent = '';
                    } else {
                        errorTitle.textContent = response.detail.message || '鐧诲綍澶辫触';
                        errorSuggestion.textContent = response.detail.suggestion || '';
                    }
                } else if (response?.message) {
                    errorTitle.textContent = response.message;
                    errorSuggestion.textContent = '';
                } else {
                    errorTitle.textContent = '鐧诲綍澶辫触锛岃绋嶅悗閲嶈瘯';
                    errorSuggestion.textContent = '';
                }
                
                errorMessage.style.display = 'block';
            } finally {
                // Reset button state
                loginButton.textContent = '鐧诲綍';
                loginButton.disabled = false;
            }
        });
    </script>
</body>
</html>
