﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoom Chamber</title>
    <style>
        /* Wiki Platform V3 统一样式 */
        :root {
            --color-primary: #0D8ABC;
            --color-primary-dark: #096a8f;
            --color-primary-light: #3498db;
            --color-secondary: #9b59b6;
            --color-accent: #ff6b6b;
            --color-success: #27ae60;
            --color-danger: #e74c3c;
            --color-warning: #f39c12;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-background: #121212;
            --color-surface: #1a1a1a;
            --color-surface-hover: #2a2a2a;
            --color-border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-surface);
            color: var(--color-text);
            line-height: 1.6;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 页面标题样式 */
        .music-view {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header-section h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .header-section p {
            font-size: 1.2rem;
            color: var(--color-text-muted);
        }

        /* 音乐播放器容器 */
        .music-player-container {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            background: #0a0a0a;
            color: #fff;
            min-height: 80vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            position: relative;
        }

        @media (max-width: 768px) {
            .music-player-container {
                flex-direction: column;
                padding: 1rem;
            }
        }

        /* 错误通知 */
        .error-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .error-icon {
            font-size: 1.2rem;
        }

        .error-text {
            flex: 1;
            font-size: 0.95rem;
        }

        .error-close, .error-retry {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .error-close:hover, .error-retry:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 播放器卡片 */
        .player-card {
            flex: 1;
            background: linear-gradient(145deg, var(--color-surface), var(--color-surface-dark));
            border-radius: 16px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-border);
            max-width: 500px;
        }

        /* 可视化效果 */
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 120px;
            width: 100%;
            margin-bottom: 2rem;
            padding: 1rem;
            background: radial-gradient(ellipse at center, rgba(0, 255, 136, 0.05) 0%, transparent 70%);
            border-radius: 8px;
        }

        .bar {
            width: 10px;
            background: linear-gradient(to top, var(--color-primary), var(--color-primary-dark));
            height: 10%;
            border-radius: 2px;
            transition: height 0.15s ease;
            animation: bounce 0.8s infinite ease-in-out alternate;
            animation-play-state: paused;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .visualizer.playing .bar {
            animation-play-state: running;
        }

        @keyframes bounce {
            0% {
                height: 10%;
                opacity: 0.5;
            }
            100% {
                height: 100%;
                opacity: 1;
            }
        }

        /* 曲目信息 */
        .track-info {
            text-align: center;
            margin-bottom: 2rem;
            min-height: 80px;
        }

        .track-info h2 {
            font-size: 1.6rem;
            margin: 0 0 0.5rem;
            color: var(--color-primary);
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            font-weight: 600;
        }

        .track-info p {
            margin: 0;
            color: #888;
            font-size: 1rem;
        }

        .track-info .no-artist {
            color: #555;
        }

        .track-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #888;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 播放控制按钮 */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .control-btn {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--color-primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .control-btn:hover:not(:disabled) {
            background: rgba(0, 255, 136, 0.15);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .control-btn.mode-btn {
            width: 40px;
            height: 40px;
            font-size: 1rem;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
            border-width: 2px;
            background: rgba(0, 255, 136, 0.1);
        }

        .play-btn.loading {
            font-size: 1rem;
        }

        .btn-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid transparent;
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* 进度和音量滑块 */
        .progress-container, .volume-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .progress-container {
            margin-bottom: 1rem;
        }

        .time {
            font-size: 0.85rem;
            color: #888;
            font-variant-numeric: tabular-nums;
            min-width: 45px;
        }

        .slider-wrapper {
            flex: 1;
            position: relative;
            height: 24px;
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            z-index: 2;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--color-primary);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            transition: transform 0.2s;
            margin-top: -6px;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]:disabled {
            cursor: not-allowed;
        }

        input[type="range"]:disabled::-webkit-slider-thumb {
            background: #555;
            box-shadow: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: transparent;
            border-radius: 2px;
        }

        .progress-fill, .volume-fill {
            position: absolute;
            height: 4px;
            background: linear-gradient(to right, var(--color-primary), var(--color-primary-dark));
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
        }

        .volume-container {
            margin-bottom: 1rem;
        }

        .mute-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.25rem;
            transition: transform 0.2s;
        }

        .mute-btn:hover {
            transform: scale(1.1);
        }

        /* 键盘提示 */
        .keyboard-hints {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #555;
            margin-top: auto;
            padding-top: 1rem;
        }

        .keyboard-hints span {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            border: 1px solid #333;
        }

        /* 播放列表 */
        .playlist {
            flex: 1;
            background: linear-gradient(145deg, #151515, #0a0a0a);
            border-radius: 16px;
            padding: 1.5rem;
            overflow-y: auto;
            max-height: 600px;
            border: 1px solid #222;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
            margin-bottom: 1rem;
        }

        .playlist-header h3 {
            margin: 0;
            color: var(--color-primary);
            font-size: 1.2rem;
        }

        .track-count {
            font-size: 0.85rem;
            color: #666;
        }

        .playlist-loading, .playlist-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #666;
        }

        .empty-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }

        .retry-btn {
            margin-top: 1rem;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .playlist ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .playlist li {
            display: flex;
            align-items: center;
            padding: 0.875rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .playlist li:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .playlist li.active {
            background: rgba(0, 255, 136, 0.08);
            border-left: 3px solid var(--color-primary);
        }

        .playlist li.playing .track-title {
            color: var(--color-primary);
        }

        .track-number-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            position: relative;
        }

        .track-number {
            color: #555;
            font-size: 0.85rem;
        }

        .playlist li.active .track-number {
            opacity: 0;
        }

        .playing-indicator {
            position: absolute;
            color: var(--color-primary);
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .track-info-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 0;
        }

        .track-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            color: #666;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-duration {
            font-size: 0.85rem;
            color: #666;
            font-variant-numeric: tabular-nums;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <header>
        <h1>Echoom Chamber</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="metro.html">Metro</a></li>
                <li><a href="music.html" class="active">Music</a></li>
                <li><a href="profile.html">个人资料</a></li>
                <li><a href="login.html">登录</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="music-view">
            <div class="header-section">
                <h1>Echoom Chamber</h1>
                <p>Listen to the resonating sounds of the digital soul.</p>
            </div>
            
            <div class="music-player-container">
                <!-- 错误通知 -->
                <div id="errorNotification" class="error-notification" style="display: none;">
                    <span class="error-icon">⚠️</span>
                    <span id="errorText" class="error-text">加载音乐数据失败</span>
                    <button id="errorClose" class="error-close">×</button>
                    <button id="errorRetry" class="error-retry">重试</button>
                </div>

                <!-- 播放器卡片 -->
                <div class="player-card">
                    <!-- 可视化效果 -->
                    <div id="visualizer" class="visualizer">
                        <div class="bar" style="animation-delay: 0.05s;"></div>
                        <div class="bar" style="animation-delay: 0.1s;"></div>
                        <div class="bar" style="animation-delay: 0.15s;"></div>
                        <div class="bar" style="animation-delay: 0.2s;"></div>
                        <div class="bar" style="animation-delay: 0.25s;"></div>
                        <div class="bar" style="animation-delay: 0.3s;"></div>
                        <div class="bar" style="animation-delay: 0.35s;"></div>
                        <div class="bar" style="animation-delay: 0.4s;"></div>
                        <div class="bar" style="animation-delay: 0.45s;"></div>
                        <div class="bar" style="animation-delay: 0.5s;"></div>
                        <div class="bar" style="animation-delay: 0.55s;"></div>
                        <div class="bar" style="animation-delay: 0.6s;"></div>
                        <div class="bar" style="animation-delay: 0.65s;"></div>
                        <div class="bar" style="animation-delay: 0.7s;"></div>
                        <div class="bar" style="animation-delay: 0.75s;"></div>
                        <div class="bar" style="animation-delay: 0.8s;"></div>
                        <div class="bar" style="animation-delay: 0.85s;"></div>
                        <div class="bar" style="animation-delay: 0.9s;"></div>
                        <div class="bar" style="animation-delay: 0.95s;"></div>
                        <div class="bar" style="animation-delay: 1s;"></div>
                    </div>
                    
                    <!-- 曲目信息 -->
                    <div class="track-info">
                        <div id="trackLoading" class="track-loading">
                            <span class="loading-spinner"></span>
                            加载中...
                        </div>
                        <div id="trackInfo" style="display: none;">
                            <h2 id="trackTitle">选择一首歌曲</h2>
                            <p id="trackArtist" class="no-artist">未知艺术家</p>
                        </div>
                    </div>
                    
                    <!-- 播放控制 -->
                    <div class="controls">
                        <button id="modeBtn" class="control-btn mode-btn" title="播放模式: single">🔂</button>
                        <button id="prevBtn" class="control-btn" disabled title="上一首">⏮</button>
                        <button id="playBtn" class="control-btn play-btn" disabled title="播放/暂停 (Space)">
                            <span id="playBtnContent">▶</span>
                        </button>
                        <button id="nextBtn" class="control-btn" disabled title="下一首">⏭</button>
                    </div>
                    
                    <!-- 进度控制 -->
                    <div class="progress-container">
                        <span id="currentTime" class="time">0:00</span>
                        <div class="slider-wrapper">
                            <input 
                                type="range" 
                                min="0" 
                                max="100"
                                step="0.1"
                                value="0"
                                id="seekSlider"
                                disabled
                            />
                            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                        </div>
                        <span id="duration" class="time">0:00</span>
                    </div>
                    
                    <!-- 音量控制 -->
                    <div class="volume-container">
                        <button id="muteBtn" class="mute-btn" title="静音">🔊</button>
                        <div class="slider-wrapper">
                            <input 
                                type="range" 
                                min="0" 
                                max="1" 
                                step="0.01" 
                                value="0.5" 
                                id="volumeSlider"
                            />
                            <div id="volumeFill" class="volume-fill" style="width: 50%"></div>
                        </div>
                    </div>
                    
                    <!-- 键盘提示 -->
                    <div class="keyboard-hints">
                        <span>Space: 播放/暂停</span>
                        <span>← → 快进/快退</span>
                        <span>↑ ↓ 音量</span>
                    </div>
                    
                    <!-- 音频元素 -->
                    <audio 
                        id="audio" 
                        preload="metadata"
                    ></audio>
                </div>
                
                <!-- 播放列表 -->
                <div class="playlist">
                    <div class="playlist-header">
                        <h3>播放列表</h3>
                        <span id="trackCount" class="track-count">0 首</span>
                    </div>
                    
                    <div id="playlistLoading" class="playlist-loading">
                        <span class="loading-spinner"></span>
                        加载中..
                    </div>
                    
                    <div id="playlistEmpty" class="playlist-empty" style="display: none;">
                        <span class="empty-icon">🎵</span>
                        <p>无音乐</p>
                        <button id="playlistRetry" class="retry-btn">重新加载</button>
                    </div>
                    
                    <ul id="playlistList" style="display: none;">
                        <!-- 播放列表项将通过JavaScript动态生成 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 状态管理 ====================
        let tracks = [];
        let currentTrack = null;
        let isPlaying = false;
        let isLoading = false;
        let audio = null;
        let progress = 0;
        let volume = 0.5;
        let isMuted = false;
        let duration = 0;
        let currentTime = 0;
        let error = null;
        let isDragging = false;
        let dragValue = 0;
        let playMode = 'single'; // 'single', 'loop', 'shuffle'
        let loading = true;

        // ==================== DOM元素 ====================
        // 错误通知
        const errorNotification = document.getElementById('errorNotification');
        const errorText = document.getElementById('errorText');
        const errorClose = document.getElementById('errorClose');
        const errorRetry = document.getElementById('errorRetry');

        // 播放器
        const visualizer = document.getElementById('visualizer');
        const trackLoading = document.getElementById('trackLoading');
        const trackInfo = document.getElementById('trackInfo');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const modeBtn = document.getElementById('modeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const playBtn = document.getElementById('playBtn');
        const playBtnContent = document.getElementById('playBtnContent');
        const nextBtn = document.getElementById('nextBtn');
        const seekSlider = document.getElementById('seekSlider');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeFill = document.getElementById('volumeFill');
        audio = document.getElementById('audio');

        // 播放列表
        const trackCount = document.getElementById('trackCount');
        const playlistLoading = document.getElementById('playlistLoading');
        const playlistEmpty = document.getElementById('playlistEmpty');
        const playlistList = document.getElementById('playlistList');
        const playlistRetry = document.getElementById('playlistRetry');

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定事件监听器
            bindEventListeners();
            
            // 加载曲目列表
            loadTracks();
            
            // 设置初始化音量
            audio.volume = volume;
        });

        // ==================== 事件监听 ====================
        function bindEventListeners() {
            // 错误通知
            errorClose.addEventListener('click', function() {
                errorNotification.style.display = 'none';
            });
            errorRetry.addEventListener('click', retryLoad);
            playlistRetry.addEventListener('click', retryLoad);

            // 播放控制
            modeBtn.addEventListener('click', togglePlayMode);
            prevBtn.addEventListener('click', prevTrack);
            playBtn.addEventListener('click', togglePlay);
            nextBtn.addEventListener('click', nextTrack);

            // 进度控制
            seekSlider.addEventListener('mousedown', onSeekStart);
            seekSlider.addEventListener('input', onSeekInput);
            seekSlider.addEventListener('mouseup', onSeekEnd);
            seekSlider.addEventListener('touchstart', onSeekStart);
            seekSlider.addEventListener('touchmove', onSeekInput);
            seekSlider.addEventListener('touchend', onSeekEnd);

            // 音量控制
            muteBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', updateVolume);

            // 音频事件
            audio.addEventListener('timeupdate', onTimeUpdate);
            audio.addEventListener('ended', onEnded);
            audio.addEventListener('loadedmetadata', onLoadedMetadata);
            audio.addEventListener('waiting', onWaiting);
            audio.addEventListener('canplay', onCanPlay);
            audio.addEventListener('error', onError);

            // 键盘事件
            window.addEventListener('keydown', handleKeyboard);
        }

        // ==================== 曲目加载 ====================
        function loadTracks() {
            loading = true;
            error = null;
            updateUI();
            
            // 模拟API请求延迟
            setTimeout(() => {
                try {
                    // 模拟曲目数据
                    tracks = [
                        {
                            id: 1,
                            title: "Digital Dreams",
                            artists: [{ name: "Tech Master" }],
                            fileUrl: "http://example.com/digital-dreams.mp3",
                            duration: 240
                        },
                        {
                            id: 2,
                            title: "Echo Chamber",
                            artists: [{ name: "Sound Weaver" }],
                            fileUrl: "http://example.com/echo-chamber.mp3",
                            duration: 180
                        },
                        {
                            id: 3,
                            title: "Metro Rhythm",
                            artists: [{ name: "Urban Beats" }],
                            fileUrl: "http://example.com/metro-rhythm.mp3",
                            duration: 300
                        }
                    ];
                    
                    // 加载成功
                    loading = false;
                    
                    // 如果有曲目，设置第一首为当前曲目
                    if (tracks.length > 0) {
                        currentTrack = tracks[0];
                        audio.src = getAudioUrl(tracks[0].fileUrl);
                        audio.load();
                    }
                } catch (err) {
                    console.error('Failed to load tracks', err);
                    error = '无法加载音乐列表，请稍后重试';
                    loading = false;
                } finally {
                    updateUI();
                }
            }, 1000);
        }

        function getAudioUrl(url) {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            const baseUrl = 'http://localhost:8000';
            return `${baseUrl}${url}`;
        }

        // ==================== 播放控制 ====================
        function togglePlay() {
            if (isLoading || !currentTrack) return;
            
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                try {
                    audio.play();
                    isPlaying = true;
                } catch (err) {
                    console.error('Play failed:', err);
                    showError('播放失败，请检查音频文件');
                }
            }
            updateUI();
        }

        async function playTrack(track) {
            if (currentTrack?.id === track.id) {
                togglePlay();
                return;
            }
            
            hideError();
            currentTrack = track;
            isLoading = true;
            updateUI();
            
            audio.src = getAudioUrl(track.fileUrl);
            audio.load();
            
            try {
                await audio.play();
                isPlaying = true;
            } catch (err) {
                console.error('Play failed:', err);
                showError('播放失败，音频文件可能不存在');
                isPlaying = false;
            } finally {
                isLoading = false;
                updateUI();
            }
        }

        function nextTrack() {
            if (!currentTrack || tracks.length === 0) return;
            
            let nextIndex;
            
            if (playMode === 'shuffle') {
                nextIndex = Math.floor(Math.random() * tracks.length);
            } else {
                const currentIndex = tracks.findIndex(t => t.id === currentTrack.id);
                nextIndex = (currentIndex + 1) % tracks.length;
            }
            
            playTrack(tracks[nextIndex]);
        }

        function prevTrack() {
            if (!currentTrack || tracks.length === 0) return;
            
            const currentIndex = tracks.findIndex(t => t.id === currentTrack.id);
            const prevIndex = (currentIndex - 1 + tracks.length) % tracks.length;
            playTrack(tracks[prevIndex]);
        }

        function togglePlayMode() {
            const modes = ['single', 'loop', 'shuffle'];
            const currentIndex = modes.indexOf(playMode);
            playMode = modes[(currentIndex + 1) % modes.length];
            updateUI();
        }

        // ==================== 闊抽浜嬩欢 ====================
        function onTimeUpdate() {
            if (isDragging) return;
            currentTime = audio.currentTime;
            duration = audio.duration || 0;
            progress = duration ? (currentTime / duration) * 100 : 0;
            updateUI();
        }

        function onEnded() {
            if (playMode === 'loop' && currentTrack) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextTrack();
            }
        }

        function onLoadedMetadata() {
            duration = audio.duration;
            isLoading = false;
            updateUI();
        }

        function onWaiting() {
            isLoading = true;
            updateUI();
        }

        function onCanPlay() {
            isLoading = false;
            updateUI();
        }

        function onError() {
            isLoading = false;
            isPlaying = false;
            showError('音频加载失败，文件可能不存在或格式不支持');
            updateUI();
        }

        // ==================== 杩涘害鎺у埗 ====================
        function onSeekStart(event) {
            isDragging = true;
            const input = event.target;
            dragValue = parseFloat(input.value);
            updateUI();
        }

        function onSeekInput(event) {
            if (!isDragging) return;
            const input = event.target;
            dragValue = parseFloat(input.value);
            updateUI();
        }

        function onSeekEnd(event) {
            const input = event.target;
            const value = parseFloat(input.value);
            
            if (duration) {
                audio.currentTime = (value / 100) * duration;
            }
            
            isDragging = false;
            dragValue = 0;
            updateUI();
        }

        // ==================== 闊抽噺鎺у埗 ====================
        function toggleMute() {
            isMuted = !isMuted;
            audio.muted = isMuted;
            updateUI();
        }

        function updateVolume(event) {
            const input = event.target;
            volume = parseFloat(input.value);
            
            audio.volume = volume;
            if (volume > 0 && isMuted) {
                isMuted = false;
                audio.muted = false;
            }
            updateUI();
        }

        // ==================== 错误澶勭悊 ====================
        function showError(message) {
            error = message;
            errorText.textContent = message;
            errorNotification.style.display = 'flex';
        }

        function hideError() {
            error = null;
            errorNotification.style.display = 'none';
        }

        function retryLoad() {
            loadTracks();
            hideError();
        }

        // ==================== 閿洏鎺у埗 ====================
        function handleKeyboard(event) {
            if (event.target instanceof HTMLInputElement || event.target instanceof HTMLTextAreaElement) {
                return;
            }
            
            switch (event.code) {
                case 'Space':
                    event.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    audio.currentTime = Math.min(audio.currentTime + 5, duration);
                    break;
                case 'ArrowLeft':
                    audio.currentTime = Math.max(audio.currentTime - 5, 0);
                    break;
                case 'ArrowUp':
                    event.preventDefault();
                    volume = Math.min(volume + 0.1, 1);
                    audio.volume = volume;
                    updateUI();
                    break;
                case 'ArrowDown':
                    event.preventDefault();
                    volume = Math.max(volume - 0.1, 0);
                    audio.volume = volume;
                    updateUI();
                    break;
            }
        }

        // ==================== 鏍煎紡鍖栨椂闂?====================
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ==================== UI更新 ====================
        function updateUI() {
            // 更新错误通知
            if (error) {
                errorText.textContent = error;
                errorNotification.style.display = 'flex';
            } else {
                errorNotification.style.display = 'none';
            }

            // 更新播放状态
            if (isPlaying) {
                visualizer.classList.add('playing');
            } else {
                visualizer.classList.remove('playing');
            }

            // 更新曲目信息
            if (loading) {
                trackLoading.style.display = 'flex';
                trackInfo.style.display = 'none';
                playlistLoading.style.display = 'block';
                playlistEmpty.style.display = 'none';
                playlistList.style.display = 'none';
            } else {
                trackLoading.style.display = 'none';
                trackInfo.style.display = 'block';
                playlistLoading.style.display = 'none';
                
                if (tracks.length === 0) {
                    playlistEmpty.style.display = 'block';
                    playlistList.style.display = 'none';
                } else {
                    playlistEmpty.style.display = 'none';
                    playlistList.style.display = 'block';
                    renderPlaylist();
                }
            }

            // 更新曲目标题和艺术家
            if (currentTrack) {
                trackTitle.textContent = currentTrack.title;
                if (currentTrack.artists?.length) {
                    trackArtist.textContent = currentTrack.artists.map(a => a.name).join(', ');
                    trackArtist.classList.remove('no-artist');
                } else {
                    trackArtist.textContent = '未知艺术家';
                    trackArtist.classList.add('no-artist');
                }
            } else if (tracks.length === 0) {
                trackTitle.textContent = '无音乐';
                trackArtist.textContent = '';
                trackArtist.classList.add('no-artist');
            } else {
                trackTitle.textContent = '选择一首歌曲';
                trackArtist.textContent = '';
                trackArtist.classList.add('no-artist');
            }

            // 更新播放按钮
            if (isLoading) {
                playBtn.classList.add('loading');
                playBtnContent.innerHTML = '<span class="btn-spinner"></span>';
            } else {
                playBtn.classList.remove('loading');
                playBtnContent.textContent = isPlaying ? '⏸' : '▶';
            }

            // 更新播放模式按钮
            const modeIcons = {
                'single': '🔂',
                'loop': '🔁',
                'shuffle': '🔀'
            };
            modeBtn.textContent = modeIcons[playMode];
            modeBtn.title = `播放模式: ${playMode}`;

            // 更新控制按钮状态
            const canPlay = !isLoading && !!currentTrack;
            prevBtn.disabled = !canPlay;
            playBtn.disabled = !canPlay;
            nextBtn.disabled = !canPlay;
            seekSlider.disabled = !canPlay;

            // 更新进度滑块
            const displayProgress = isDragging ? dragValue : progress;
            seekSlider.value = displayProgress;
            progressFill.style.width = `${displayProgress}%`;

            // 更新时间显示
            currentTimeEl.textContent = formatTime(currentTime);
            durationEl.textContent = formatTime(duration);

            // 更新音量滑块
            volumeSlider.value = volume;
            volumeFill.style.width = `${volume * 100}%`;

            // 更新音量图标
            const volumeIcons = {
                'muted': '🔇',
                'low': '🔈',
                'medium': '🔉',
                'high': '🔊'
            };
            let volumeIcon;
            if (isMuted || volume === 0) {
                volumeIcon = volumeIcons.muted;
            } else if (volume < 0.3) {
                volumeIcon = volumeIcons.low;
            } else if (volume < 0.7) {
                volumeIcon = volumeIcons.medium;
            } else {
                volumeIcon = volumeIcons.high;
            }
            muteBtn.textContent = volumeIcon;
            muteBtn.title = isMuted ? '取消静音' : '静音';

            // 更新播放列表标题
            trackCount.textContent = `${tracks.length} 首`;
        }

        // ==================== 渲染播放列表 ====================
        function renderPlaylist() {
            playlistList.innerHTML = '';
            
            tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = '';
                if (currentTrack?.id === track.id) {
                    li.classList.add('active');
                    if (isPlaying) {
                        li.classList.add('playing');
                    }
                }
                
                li.innerHTML = `
                    <div class="track-number-wrapper">
                        <span class="track-number">${index + 1}</span>
                        <span class="playing-indicator" style="display: ${currentTrack?.id === track.id ? 'inline' : 'none'}">
                            ${isPlaying ? '▶' : '⏸'}
                        </span>
                    </div>
                    <div class="track-info-wrapper">
                        <span class="track-title">${track.title}</span>
                        <span class="track-artist">${track.artists?.[0]?.name || ''}</span>
                    </div>
                    <span class="track-duration">${formatTime(track.duration)}</span>
                `;
                
                li.addEventListener('click', () => playTrack(track));
                playlistList.appendChild(li);
            });
        }
    </script>
</body>
</html>
