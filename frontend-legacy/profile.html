<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - Wiki Platform</title>
    <script src="utils.js"></script>
    <style>
        /* Wiki Platform V3 统一样式 */
        :root {
            --color-primary: #0D8ABC;
            --color-primary-dark: #096a8f;
            --color-primary-light: #3498db;
            --color-secondary: #9b59b6;
            --color-accent: #ff6b6b;
            --color-success: #27ae60;
            --color-danger: #e74c3c;
            --color-warning: #f39c12;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-background: #121212;
            --color-surface: #1a1a1a;
            --color-surface-hover: #2a2a2a;
            --color-border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif; background-color: var(--color-background); color: var(--color-text); line-height: 1.6; }
        header { background: var(--color-surface); padding: 15px 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a { color: var(--color-text); text-decoration: none; padding: 8px 15px; border-radius: 4px; transition: all 0.3s ease; }
        nav a:hover, nav a.active { background: var(--color-primary); color: #000; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .profile-header { text-align: center; margin-bottom: 40px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--color-surface); border: 3px solid var(--color-primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 3rem; }
        .profile-name { font-size: 2rem; margin-bottom: 10px; color: var(--color-primary); }
        .profile-username { color: var(--color-text-muted); margin-bottom: 20px; }
        .profile-stats { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--color-primary); }
        .stat-label { color: var(--color-text-muted); font-size: 0.9rem; }
        .profile-section { background: var(--color-surface); padding: 30px; border-radius: 8px; border: 1px solid var(--color-border); margin-bottom: 20px; }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; color: var(--color-primary); border-bottom: 1px solid var(--color-border); padding-bottom: 10px; }
        .info-row { display: flex; margin-bottom: 15px; }
        .info-label { width: 100px; color: var(--color-text-muted); }
        .info-value { flex: 1; }
        .loading { text-align: center; padding: 40px; color: var(--color-text-muted); }
    </style>
</head>
<body>
    <header>
        <h1>Wiki Platform</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="profile.html" class="active">个人资料</a></li>
                <li><a href="login.html">登录</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div id="loading" class="loading">加载中...</div>
        <div id="content" style="display:none;">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar">?</div>
                <h1 class="profile-name" id="displayName">用户名</h1>
                <p class="profile-username">@<span id="username">username</span></p>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="articleCount">0</div>
                        <div class="stat-label">文章</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="commentCount">0</div>
                        <div class="stat-label">评论</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="contributionCount">0</div>
                        <div class="stat-label">贡献</div>
                    </div>
                </div>
            </div>
            <div class="profile-section">
                <h2 class="section-title">个人信息</h2>
                <div class="info-row">
                    <span class="info-label">邮箱</span>
                    <span class="info-value" id="email">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">简介</span>
                    <span class="info-value" id="bio">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">注册时间</span>
                    <span class="info-value" id="createdAt">-</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        const mockUser = {
            id: 1,
            username: "admin",
            email: "admin@example.com",
            displayName: "管理员",
            bio: "这是我的个人简介",
            role: "admin",
            createdAt: "2023-01-01T00:00:00Z",
            articleCount: 15,
            commentCount: 42,
            contributionCount: 57
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            initPage('profile', '个人资料');
            
            setTimeout(() => {
                document.getElementById('avatar').textContent = mockUser.displayName.charAt(0);
                document.getElementById('displayName').textContent = mockUser.displayName;
                document.getElementById('username').textContent = mockUser.username;
                document.getElementById('email').textContent = mockUser.email;
                document.getElementById('bio').textContent = mockUser.bio;
                document.getElementById('createdAt').textContent = new Date(mockUser.createdAt).toLocaleDateString();
                document.getElementById('articleCount').textContent = mockUser.articleCount;
                document.getElementById('commentCount').textContent = mockUser.commentCount;
                document.getElementById('contributionCount').textContent = mockUser.contributionCount;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            }, 500);
        });
    </script>
</body>
</html>
