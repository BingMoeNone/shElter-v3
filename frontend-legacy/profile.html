<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>涓汉璧勬枡</title>
    <style>
        :root {
            --color-primary: #00ff9d;
            --color-secondary: #00d1ff;
            --color-accent: #ff00ff;
            --color-text: #fff;
            --color-text-muted: #aaa;
            --color-surface: #1a1a1a;
            --color-border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: var(--color-text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .profile-page {
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-page h1 {
            margin-bottom: 24px;
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
        }

        .profile-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .profile-card,
        .stats-card {
            background: var(--color-surface);
            border: 1px solid var(--color-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
            padding: 24px;
            border-radius: 8px;
        }

        .profile-card .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .profile-card label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--color-text);
        }

        .profile-card input,
        .profile-card textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .profile-card input:focus,
        .profile-card textarea:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
            outline: none;
        }

        .profile-card input:disabled {
            background: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            color: var(--color-text-muted);
            border-color: var(--color-border);
        }

        .profile-card textarea {
            resize: vertical;
            min-height: 100px;
        }

        .char-count {
            position: absolute;
            right: 8px;
            bottom: 8px;
            font-size: 0.75rem;
            color: var(--color-text-muted);
        }

        .error-message {
            color: #ff4444;
            padding: 12px;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 4px;
            margin-bottom: 16px;
            border-left: 3px solid #ff4444;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-save {
            padding: 12px 32px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 15px var(--color-primary);
        }

        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats-card h2 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            color: var(--color-secondary);
            text-shadow: 0 0 5px var(--color-secondary);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--color-border);
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat .label {
            color: var(--color-text-muted);
        }

        .stat .value {
            font-weight: 500;
            color: var(--color-accent);
        }

        .role-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .role-badge.admin {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .role-badge.moderator {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .role-badge.user {
            background: rgba(0, 255, 157, 0.2);
            color: var(--color-primary);
        }

        .not-authenticated {
            text-align: center;
            padding: 60px;
            color: var(--color-text-muted);
        }

        .lock-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 16px;
        }

        .not-authenticated a {
            color: var(--color-primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>涓汉璧勬枡</h1>
        <nav>
            <ul>
                <li><a href="index.html">棣栭〉</a></li>
                <li><a href="articles.html">鏂囩珷</a></li>
                <li><a href="profile.html" class="active">涓汉璧勬枡</a></li>
                <li><a href="login.html">鐧诲綍</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="profile-page">
            <!-- 宸茬櫥褰曠姸鎬?-->
            <div id="profileContent" class="profile-content" style="display: block;">
                <div class="profile-card card">
                    <div class="form-group">
                        <label for="username">鐢ㄦ埛鍚?/label>
                        <input
                            id="username"
                            type="text"
                            disabled
                        />
                    </div>
                    
                    <div class="form-group">
                        <label for="email">閭</label>
                        <input
                            id="email"
                            type="email"
                            disabled
                        />
                    </div>
                    
                    <div class="form-group">
                        <label for="displayName">鏄剧ず鍚嶇О</label>
                        <input
                            id="displayName"
                            type="text"
                            maxlength="50"
                            placeholder="璁剧疆涓€涓樉绀哄悕绉?
                        />
                        <span class="char-count" id="displayNameCount">0/50</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="bio">涓汉绠€浠?/label>
                        <textarea
                            id="bio"
                            rows="4"
                            maxlength="500"
                            placeholder="浠嬬粛涓€涓嬭嚜宸?.."
                        ></textarea>
                        <span class="char-count" id="bioCount">0/500</span>
                    </div>
                    
                    <div id="errorMessage" class="error-message" style="display: none;"></div>
                    
                    <div class="form-actions">
                        <button 
                            id="saveBtn"
                            class="btn-save"
                            disabled
                        >
                            <span id="spinner" class="btn-spinner" style="display: none;"></span>
                            <span id="saveBtnText">淇濆瓨鏇存敼</span>
                        </button>
                    </div>
                </div>
                
                <div class="stats-card card">
                    <h2>璐︽埛缁熻</h2>
                    <div class="stat">
                        <span class="label">璐＄尞鏁?/span>
                        <span class="value" id="contributionCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="label">瑙掕壊</span>
                        <span class="value role-badge" id="roleBadge">user</span>
                    </div>
                    <div class="stat">
                        <span class="label">娉ㄥ唽鏃堕棿</span>
                        <span class="value" id="createdAt">--</span>
                    </div>
                </div>
            </div>
            
            <!-- 鏈櫥褰曠姸鎬?-->
            <div id="notAuthenticated" class="not-authenticated" style="display: none;">
                <span class="lock-icon">馃敀</span>
                <p>璇?a href="login.html">鐧诲綍</a>鏌ョ湅涓汉璧勬枡</p>
            </div>
        </div>
    </div>

    <script>
        // 妯℃嫙鐢ㄦ埛鏁版嵁
        const mockUser = {
            id: 1,
            username: "testuser",
            email: "test@example.com",
            displayName: "娴嬭瘯鐢ㄦ埛",
            bio: "杩欐槸涓€涓祴璇曠敤鎴风殑涓汉绠€浠?,
            role: "user",
            contributionCount: 15,
            createdAt: "2023-01-15T10:30:00Z"
        };

        // 鐘舵€佺鐞?        let displayName = '';
        let bio = '';
        let saving = false;
        let originalDisplayName = '';
        let originalBio = '';

        // 椤甸潰鍔犺浇鏃跺垵濮嬪寲
        document.addEventListener('DOMContentLoaded', function() {
            // 妯℃嫙鐧诲綍鐘舵€侊紝瀹為檯椤圭洰涓彲浠ラ€氳繃localStorage鎴朅PI妫€鏌?            const isAuthenticated = true;
            
            if (isAuthenticated) {
                // 鍒濆鍖栫敤鎴锋暟鎹?                document.getElementById('username').value = mockUser.username;
                document.getElementById('email').value = mockUser.email;
                
                // 鍒濆鍖栧彲缂栬緫瀛楁
                displayName = mockUser.displayName;
                bio = mockUser.bio;
                originalDisplayName = displayName;
                originalBio = bio;
                
                document.getElementById('displayName').value = displayName;
                document.getElementById('bio').value = bio;
                
                // 鏇存柊瀛楃璁℃暟
                updateCharCounts();
                
                // 鍒濆鍖栫粺璁′俊鎭?                document.getElementById('contributionCount').textContent = mockUser.contributionCount;
                document.getElementById('roleBadge').textContent = mockUser.role;
                document.getElementById('roleBadge').className = `value role-badge ${mockUser.role}`;
                document.getElementById('createdAt').textContent = formatDate(mockUser.createdAt);
                
                // 妫€鏌ユ槸鍚︽湁鏇存敼
                checkChanges();
            } else {
                // 鏄剧ず鏈櫥褰曠姸鎬?                document.getElementById('profileContent').style.display = 'none';
                document.getElementById('notAuthenticated').style.display = 'block';
            }

            // 缁戝畾浜嬩欢鐩戝惉鍣?            bindEventListeners();
        });

        // 缁戝畾浜嬩欢鐩戝惉鍣?        function bindEventListeners() {
            const displayNameInput = document.getElementById('displayName');
            const bioInput = document.getElementById('bio');
            const saveBtn = document.getElementById('saveBtn');

            // 鏄剧ず鍚嶇О杈撳叆浜嬩欢
            displayNameInput.addEventListener('input', function() {
                displayName = this.value;
                updateCharCounts();
                checkChanges();
            });

            // 涓汉绠€浠嬭緭鍏ヤ簨浠?            bioInput.addEventListener('input', function() {
                bio = this.value;
                updateCharCounts();
                checkChanges();
            });

            // 淇濆瓨鎸夐挳鐐瑰嚮浜嬩欢
            saveBtn.addEventListener('click', handleSave);
        }

        // 鏇存柊瀛楃璁℃暟
        function updateCharCounts() {
            document.getElementById('displayNameCount').textContent = `${displayName.length}/50`;
            document.getElementById('bioCount').textContent = `${bio.length}/500`;
        }

        // 妫€鏌ユ槸鍚︽湁鏇存敼
        function checkChanges() {
            const hasChanges = displayName !== originalDisplayName || bio !== originalBio;
            document.getElementById('saveBtn').disabled = !hasChanges || saving;
        }

        // 澶勭悊淇濆瓨
        function handleSave() {
            if (saving) return;
            
            saving = true;
            const saveBtn = document.getElementById('saveBtn');
            const spinner = document.getElementById('spinner');
            const saveBtnText = document.getElementById('saveBtnText');
            const errorMessage = document.getElementById('errorMessage');
            
            // 鏇存柊鎸夐挳鐘舵€?            saveBtn.disabled = true;
            spinner.style.display = 'inline-block';
            saveBtnText.textContent = '淇濆瓨涓?..';
            errorMessage.style.display = 'none';
            
            // 妯℃嫙API璇锋眰
            setTimeout(() => {
                try {
                    // 妯℃嫙淇濆瓨鎴愬姛
                    originalDisplayName = displayName;
                    originalBio = bio;
                    
                    // 鏄剧ず鎴愬姛鎻愮ず锛堣繖閲屽彲浠ユ坊鍔爐oast閫氱煡锛?                    console.log('涓汉璧勬枡宸叉洿鏂?);
                    
                    // 鏇存柊鎸夐挳鐘舵€?                    spinner.style.display = 'none';
                    saveBtnText.textContent = '淇濆瓨鎴愬姛';
                    
                    // 1绉掑悗鎭㈠鎸夐挳鏂囨湰
                    setTimeout(() => {
                        saveBtnText.textContent = '淇濆瓨鏇存敼';
                    }, 1000);
                } catch (err) {
                    // 澶勭悊閿欒
                    errorMessage.textContent = '鏇存柊澶辫触锛岃閲嶈瘯';
                    errorMessage.style.display = 'block';
                    
                    // 鎭㈠鎸夐挳鐘舵€?                    spinner.style.display = 'none';
                    saveBtnText.textContent = '淇濆瓨鏇存敼';
                } finally {
                    saving = false;
                    checkChanges();
                }
            }, 1500);
        }

        // 鏍煎紡鍖栨棩鏈?        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
    </script>
</body>
</html>
