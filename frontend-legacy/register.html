﻿<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Platform - Register</title>
    <style>
        /* Global Styles - 使用优化的配色方案 */
        :root {
            --color-primary: #3B82F6;
            --color-primary-dark: #2563EB;
            --color-primary-light: #60A5FA;
            --color-primary-soft: rgba(59, 130, 246, 0.15);
            
            --color-secondary: #8B5CF6;
            --color-accent: #10B981;
            
            --color-success: #10B981;
            --color-success-soft: rgba(16, 185, 129, 0.1);
            --color-danger: #EF4444;
            --color-danger-soft: rgba(239, 68, 68, 0.1);
            --color-warning: #F59E0B;
            --color-warning-soft: rgba(245, 158, 11, 0.1);
            
            --color-text: #F1F5F9;
            --color-text-muted: #94A3B8;
            --color-text-dark: #64748B;
            
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-surface-hover: #334155;
            --color-border: #334155;
            --color-border-light: #475569;
            --color-border-focus: #3B82F6;
            
            --gradient-primary: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            --gradient-secondary: linear-gradient(135deg, #10B981 0%, #3B82F6 100%);
            
            --shadow-color: rgba(15, 23, 42, 0.5);
            --shadow-color-light: rgba(59, 130, 246, 0.2);
            
            --font-family-base: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            --font-family-heading: 'Arial', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family-base);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation - 优化导航栏样式 */
        nav {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 1rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            color: var(--color-primary);
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--color-text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
        }

        .nav-link:hover {
            color: var(--color-primary);
            background: var(--color-primary-soft);
        }

        .nav-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .btn:hover {
            background: var(--color-surface-hover);
            border-color: var(--color-border-focus);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: var(--color-text);
            border: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        /* Register Page Styles - 优化注册页面 */
        .register-page {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: calc(100vh - 200px);
        }

        .register-card {
            width: 100%;
            max-width: 480px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            box-shadow: 0 8px 32px var(--shadow-color);
            padding: 40px;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }

        .register-card h1 {
            text-align: center;
            margin-bottom: 32px;
            color: var(--color-text);
            font-size: 2rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--color-text);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--color-border);
            background: var(--color-background);
            color: var(--color-text);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s ease;
            font-family: var(--font-family-base);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-border-focus);
            box-shadow: 0 0 0 3px var(--color-primary-soft);
            background: var(--color-surface);
        }

        .form-group input:hover {
            border-color: var(--color-border-light);
        }

        .form-group input::placeholder {
            color: var(--color-text-muted);
        }

        .hint {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        .error-message {
            color: #FCA5A5;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: var(--color-danger-soft);
            border-radius: 10px;
            border-left: 4px solid var(--color-danger);
            font-size: 0.9rem;
        }

        .error-title {
            margin: 0 0 6px 0;
            font-weight: 600;
            color: var(--color-danger);
        }

        .error-suggestion {
            margin: 0;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        .success-message {
            color: var(--color-success);
            margin-bottom: 20px;
            padding: 14px 16px;
            background: var(--color-success-soft);
            border-radius: 10px;
            border-left: 4px solid var(--color-success);
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            margin-top: 8px;
            background: var(--gradient-primary);
            border: none;
            color: var(--color-text);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--color-primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: var(--color-primary-light);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Wiki Platform</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="articles.html" class="nav-link">Articles</a>
                <a href="categories.html" class="nav-link">Categories</a>
                <a href="metro.html" class="nav-link">Metro</a>
                <a href="music.html" class="nav-link">Music</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn">Login</a>
                <a href="register.html" class="btn">Register</a>
            </div>
        </div>
    </nav>

    <!-- Register Page Content -->
    <div class="register-page">
        <div class="register-card">
            <h1>注册</h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input
                        id="username"
                        type="text"
                        required
                        pattern="[a-zA-Z0-9_]+"
                        title="用户名只能包含字母、数字和下划线"
                        placeholder="请输入用户名"
                    />
                    <p class="hint">用户名可以与其他用户相同，但需与邮箱配合使用</p>
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱 *</label>
                    <input
                        id="email"
                        type="email"
                        required
                        placeholder="请输入邮箱地址"
                    />
                    <p class="hint">邮箱是您的唯一身份标识，不可重置</p>
                </div>
                
                <div class="form-group">
                    <label for="displayName">显示名称</label>
                    <input
                        id="displayName"
                        type="text"
                        placeholder="可选，用于显示您的昵称"
                    />
                </div>
                
                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input
                        id="password"
                        type="password"
                        required
                        minlength="8"
                        placeholder="至少 8 个字符"
                    />
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">确认密码 *</label>
                    <input
                        id="confirmPassword"
                        type="password"
                        required
                        placeholder="请再次输入密码"
                    />
                </div>
                
                <div id="successMessage" class="success-message" style="display: none;">
                    <p id="successText"></p>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;">
                    <p id="errorTitle" class="error-title"></p>
                    <p id="errorSuggestion" class="error-suggestion"></p>
                </div>
                
                <button type="submit" id="registerButton" class="btn-register">
                    注册
                </button>
            </form>
            
            <p class="login-link">
                已有账户？<a href="login.html">点此跳转登录页</a>
            </p>
        </div>
    </div>

    <script>
        // DOM Elements
        const registerForm = document.getElementById('registerForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const displayNameInput = document.getElementById('displayName');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const registerButton = document.getElementById('registerButton');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const errorMessage = document.getElementById('errorMessage');
        const errorTitle = document.getElementById('errorTitle');
        const errorSuggestion = document.getElementById('errorSuggestion');

        // API配置
        const API_BASE_URL = 'http://127.0.0.1:8000/api/v1';

        // 注册API调用函数
        async function registerAPI(userData) {
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(userData)
            });

            const data = await response.json();

            if (!response.ok) {
                throw {
                    response: {
                        status: response.status,
                        data: data
                    }
                };
            }

            return data;
        }

        // Mock register function (保留作为后备)
        function mockRegister(userData) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (userData.username && userData.email && userData.password) {
                        resolve({ success: true });
                    } else {
                        reject({ 
                            response: { 
                                status: 400,
                                data: { 
                                    success: false,
                                    message: '注册失败，请检查输入信息',
                                    detail: { 
                                        message: '注册失败，请检查输入信息',
                                        suggestion: '请确保所有必填字段都已填写正确'
                                    } 
                                } 
                            } 
                        });
                    }
                }, 1500);
            });
        }

        // Handle register form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const displayName = displayNameInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Reset messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Validate password confirmation
            if (password !== confirmPassword) {
                errorTitle.textContent = '两次输入的密码不一致';
                errorSuggestion.textContent = '';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Validate password length
            if (password.length < 8) {
                errorTitle.textContent = '密码长度至少为 8 个字符';
                errorSuggestion.textContent = '';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Update button state
            registerButton.textContent = '注册中...';
            registerButton.disabled = true;
            
            try {
                // 调用真实API注册
                let registerResult;
                try {
                    registerResult = await registerAPI({
                        username,
                        email,
                        password,
                        displayName: displayName || undefined
                    });
                } catch (apiError) {
                    // 如果API调用失败，使用mock作为后备（仅用于开发环境）
                    console.warn('API调用失败，使用模拟注册:', apiError);
                    await mockRegister({
                        username,
                        email,
                        password,
                        displayName: displayName || undefined
                    });
                }
                
                // Show success message
                successText.textContent = '注册成功，正在为您自动登录...';
                successMessage.style.display = 'block';
                
                // Redirect after a short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (err) {
                // Show error message
                const response = err.response?.data;
                if (response?.detail) {
                    if (typeof response.detail === 'string') {
                        errorTitle.textContent = response.detail;
                        errorSuggestion.textContent = '';
                    } else {
                        errorTitle.textContent = response.detail.message || '注册失败';
                        errorSuggestion.textContent = response.detail.suggestion || '';
                    }
                } else if (response?.message) {
                    errorTitle.textContent = response.message;
                    errorSuggestion.textContent = '';
                } else {
                    errorTitle.textContent = '注册失败，请稍后重试';
                    errorSuggestion.textContent = '';
                }
                
                errorMessage.style.display = 'block';
            } finally {
                // Reset button state
                registerButton.textContent = '注册';
                registerButton.disabled = false;
            }
        });
    </script>
</body>
</html>
