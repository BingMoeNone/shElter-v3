﻿﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索文章</title>
    <style>
        /* Wiki Platform V3 统一样式 */
        :root {
            --color-primary: #0D8ABC;
            --color-primary-dark: #096a8f;
            --color-primary-light: #3498db;
            --color-secondary: #9b59b6;
            --color-accent: #ff6b6b;
            --color-success: #27ae60;
            --color-danger: #e74c3c;
            --color-warning: #f39c12;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-background: #121212;
            --color-surface: #1a1a1a;
            --color-surface-hover: #2a2a2a;
            --color-border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-page {
            max-width: 800px;
            margin: 0 auto;
        }

        .search-page h1 {
            margin-bottom: 24px;
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
        }

        .search-form {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-form input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-primary);
            color: var(--color-text);
            border-radius: 4px;
            transition: all 0.3s;
        }

        .search-form input:focus {
            box-shadow: 0 0 10px var(--color-primary);
            outline: none;
        }

        .search-form button {
            padding: 12px 24px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-form button:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 15px var(--color-primary);
        }

        .search-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: var(--color-text-muted) !important;
            color: var(--color-text-muted) !important;
        }

        .btn-clear:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .results-info {
            color: var(--color-text-muted);
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(0, 255, 157, 0.05);
            border-radius: 4px;
            border-left: 3px solid var(--color-primary);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: #ff4444;
            text-align: center;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .retry-btn {
            margin-top: 16px;
            padding: 8px 24px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: #ff4444;
            color: white;
        }

        .no-results,
        .search-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
            text-align: center;
            border: 1px dashed var(--color-border);
            border-radius: 8px;
        }

        .empty-icon,
        .placeholder-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .suggestion {
            font-size: 0.9rem;
            margin-top: 8px;
            color: var(--color-text-muted);
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 文章卡片样式 */
        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
            transition: all 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 255, 157, 0.2);
        }

        .article-card-header {
            margin-bottom: 16px;
        }

        .article-card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--color-primary);
        }

        .article-card-title a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .article-card-title a:hover {
            text-decoration: underline;
        }

        .article-card-meta {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .article-card-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .article-card-excerpt {
            color: var(--color-text);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .article-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .article-card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .article-card-tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .article-card-tag:hover {
            background: var(--color-primary);
            color: #000;
        }

        .article-card-read-more {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .article-card-read-more:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>搜索文章</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="profile.html">个人资料</a></li>
                <li><a href="login.html">登录</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="search-page">
            <h1>搜索文章</h1>
            
            <div class="search-form">
                <input
                    type="search"
                    id="searchQuery"
                    placeholder="输入关键词搜索..."
                />
                <button id="searchBtn">搜索</button>
                <button id="clearBtn" class="btn-clear" style="display: none;">
                    清除
                </button>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>正在搜索...</p>
            </div>
            
            <div id="errorState" class="error-state" style="display: none;">
                <span class="error-icon">⚠️</span>
                <p id="errorMessage">搜索失败</p>
                <button id="retryBtn" class="retry-btn">重试</button>
            </div>
            
            <div id="searchPlaceholder" class="search-placeholder">
                <span class="placeholder-icon">🔍</span>
                <p>输入关键词开始搜索</p>
            </div>
            
            <div id="searchResults" style="display: none;">
                <div id="resultsInfo" class="results-info" style="display: none;"></div>
                
                <div id="noResults" class="no-results" style="display: none;">
                    <span class="empty-icon">🔍</span>
                    <p id="noResultsText">未找到与 "" 相关的文章</p>
                    <p class="suggestion">尝试使用不同的关键词</p>
                </div>
                
                <div id="resultsList" class="results-list">
                    <!-- 搜索结果将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 状态管理
        let articles = [];
        let loading = false;
        let searchQuery = '';
        let error = null;
        let hasSearched = false;

        // DOM元素
        const searchQueryInput = document.getElementById('searchQuery');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loadingElement = document.getElementById('loading');
        const errorStateElement = document.getElementById('errorState');
        const errorMessageElement = document.getElementById('errorMessage');
        const retryBtn = document.getElementById('retryBtn');
        const searchPlaceholderElement = document.getElementById('searchPlaceholder');
        const searchResultsElement = document.getElementById('searchResults');
        const resultsInfoElement = document.getElementById('resultsInfo');
        const noResultsElement = document.getElementById('noResults');
        const noResultsTextElement = document.getElementById('noResultsText');
        const resultsListElement = document.getElementById('resultsList');

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定事件监听器
            bindEventListeners();
            
            // 从URL获取搜索参数
            const urlParams = new URLSearchParams(window.location.search);
            const q = urlParams.get('q');
            if (q) {
                searchQuery = q;
                searchQueryInput.value = q;
                performSearch();
            }
        });

        // 绑定事件监听器
        function bindEventListeners() {
            // 搜索输入事件
            searchQueryInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // 搜索按钮事件
            searchBtn.addEventListener('click', performSearch);

            // 清除按钮事件
            clearBtn.addEventListener('click', clearSearch);

            // 重试按钮事件
            retryBtn.addEventListener('click', performSearch);
        }

        // 执行搜索
        function performSearch() {
            const query = searchQueryInput.value.trim();
            if (!query) return;
            
            searchQuery = query;
            loading = true;
            error = null;
            hasSearched = true;
            updateUI();
            
            // 更新URL
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set('q', query);
            window.history.pushState({}, '', `?${urlParams.toString()}`);
            
            // 模拟API请求延迟
            setTimeout(() => {
                try {
                    // 模拟搜索结果
                    const mockResults = [
                        {
                            id: 1,
                            title: "FastAPI后端开发最佳实践",
                            excerpt: "本文介绍了使用FastAPI开发后端应用的最佳实践，包括路由设计、数据库集成、认证体系等方面。",
                            author: { username: "admin" },
                            category: "tech",
                            tags: ["fastapi", "python", "backend"],
                            created_at: "2023-01-15T10:30:00Z",
                            updated_at: "2023-01-15T14:45:00Z",
                            view_count: 123,
                            comment_count: 8
                        },
                        {
                            id: 2,
                            title: "Vue项目迁移指南",
                            excerpt: "本文介绍了如何将Vue 2项目迁移到Vue 3，包括主要变更点、迁移策略和注意事项。",
                            author: { username: "testuser" },
                            category: "tech",
                            tags: ["vue", "frontend", "migration"],
                            created_at: "2023-02-20T14:20:00Z",
                            updated_at: "2023-02-20T16:30:00Z",
                            view_count: 456,
                            comment_count: 15
                        }
                    ];
                    
                    // 模拟根据关键词过滤结果
                    articles = mockResults.filter(article => 
                        article.title.toLowerCase().includes(query.toLowerCase()) ||
                        article.excerpt.toLowerCase().includes(query.toLowerCase()) ||
                        article.tags.some(tag => tag.toLowerCase().includes(query.toLowerCase()))
                    );
                } catch (err) {
                    console.error('Search failed:', err);
                    error = '搜索失败，请稍后重试';
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 1000);
        }

        // 清除搜索
        function clearSearch() {
            searchQuery = '';
            articles = [];
            error = null;
            hasSearched = false;
            searchQueryInput.value = '';
            
            // 更新URL
            window.history.pushState({}, '', window.location.pathname);
            
            updateUI();
        }

        // 更新UI
        function updateUI() {
            // 更新搜索按钮状态
            const query = searchQueryInput.value.trim();
            searchBtn.disabled = loading || !query;
            
            // 更新清除按钮显示
            if (hasSearched) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
            }
            
            // 显示/隐藏加载状态
            if (loading) {
                loadingElement.style.display = 'flex';
                errorStateElement.style.display = 'none';
                searchPlaceholderElement.style.display = 'none';
                searchResultsElement.style.display = 'none';
            } 
            // 显示/隐藏错误状态
            else if (error) {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'flex';
                errorMessageElement.textContent = error;
                searchPlaceholderElement.style.display = 'none';
                searchResultsElement.style.display = 'none';
            } 
            // 显示/隐藏搜索结果
            else if (hasSearched) {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'none';
                searchPlaceholderElement.style.display = 'none';
                searchResultsElement.style.display = 'block';
                
                // 显示/隐藏结果信息
                if (articles.length > 0) {
                    resultsInfoElement.style.display = 'block';
                    resultsInfoElement.textContent = `找到 ${articles.length} 条与 "${searchQuery}" 相关的结果`;
                    noResultsElement.style.display = 'none';
                    renderResults();
                } else {
                    resultsInfoElement.style.display = 'none';
                    noResultsElement.style.display = 'flex';
                    noResultsTextElement.textContent = `未找到与 "${searchQuery}" 相关的文章`;
                    resultsListElement.innerHTML = '';
                }
            } 
            // 显示/隐藏搜索占位符
            else {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'none';
                searchPlaceholderElement.style.display = 'flex';
                searchResultsElement.style.display = 'none';
            }
        }

        // 渲染搜索结果
        function renderResults() {
            resultsListElement.innerHTML = '';
            
            articles.forEach(article => {
                const articleCard = document.createElement('div');
                articleCard.className = 'article-card';
                
                // 格式化日期
                const createdAt = new Date(article.created_at).toLocaleDateString('zh-CN');
                
                // 生成标签HTML
                const tagsHTML = article.tags.map(tag => 
                    `<a href="tag-articles.html?tag=${tag}" class="article-card-tag">${tag}</a>`
                ).join('');
                
                articleCard.innerHTML = `
                    <div class="article-card-header">
                        <h2 class="article-card-title">
                            <a href="article-detail.html?id=${article.id}">${article.title}</a>
                        </h2>
                        <div class="article-card-meta">
                            <span class="article-card-meta-item">
                                <span>👤</span>
                                <span>${article.author.username}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>📅</span>
                                <span>${createdAt}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>👁️</span>
                                <span>${article.view_count}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>💬</span>
                                <span>${article.comment_count}</span>
                            </span>
                        </div>
                    </div>
                    <div class="article-card-excerpt">${article.excerpt}</div>
                    <div class="article-card-footer">
                        <div class="article-card-tags">${tagsHTML}</div>
                        <a href="article-detail.html?id=${article.id}" class="article-card-read-more">阅读更多 →</a>
                    </div>
                `;
                
                resultsListElement.appendChild(articleCard);
            });
        }
    </script>
</body>
</html>
