﻿﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签文章</title>
    <style>
        /* Wiki Platform V3 统一样式 */
        :root {
            --color-primary: #0D8ABC;
            --color-primary-dark: #096a8f;
            --color-primary-light: #3498db;
            --color-secondary: #9b59b6;
            --color-accent: #ff6b6b;
            --color-success: #27ae60;
            --color-danger: #e74c3c;
            --color-warning: #f39c12;
            --color-text: #ffffff;
            --color-text-muted: #a0a0a0;
            --color-background: #121212;
            --color-surface: #1a1a1a;
            --color-surface-hover: #2a2a2a;
            --color-border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei', '微软雅黑', SimHei, '黑体', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        header {
            background: var(--color-surface);
            padding: 15px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav a:hover, nav a.active {
            background: var(--color-primary);
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .tag-articles-page {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            color: var(--color-primary);
            text-shadow: 0 0 10px var(--color-primary);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--color-text-muted);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: #ff4444;
            text-align: center;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .retry-btn {
            margin-top: 16px;
            padding: 8px 24px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: #ff4444;
            color: white;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
            text-align: center;
            border: 1px dashed var(--color-border);
            border-radius: 8px;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 文章卡片样式 */
        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
            transition: all 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 255, 157, 0.2);
        }

        .article-card-header {
            margin-bottom: 16px;
        }

        .article-card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--color-primary);
        }

        .article-card-title a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .article-card-title a:hover {
            text-decoration: underline;
        }

        .article-card-meta {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        .article-card-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .article-card-excerpt {
            color: var(--color-text);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .article-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .article-card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .article-card-tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .article-card-tag:hover {
            background: var(--color-primary);
            color: #000;
        }

        .article-card-read-more {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .article-card-read-more:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>标签文章</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="profile.html">个人资料</a></li>
                <li><a href="login.html">登录</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="tag-articles-page">
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
            
            <div id="errorState" class="error-state" style="display: none;">
                <span class="error-icon">⚠️</span>
                <p id="errorMessage">加载失败</p>
                <button id="retryBtn" class="retry-btn">重试</button>
            </div>
            
            <div id="content" style="display: none;">
                <header class="page-header">
                    <h1 id="tagName">#标签</h1>
                    <p id="tagInfo">0 篇相关文章</p>
                </header>
                
                <div id="emptyState" class="empty-state" style="display: none;">
                    <span class="empty-icon">📂</span>
                    <p>该标签下无文章</p>
                </div>
                
                <div id="articlesList" class="articles-list">
                    <!-- 文章卡片将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟标签数据
        const mockTags = [
            {
                id: 1,
                name: "fastapi",
                slug: "fastapi",
                usageCount: 2
            },
            {
                id: 2,
                name: "python",
                slug: "python",
                usageCount: 3
            },
            {
                id: 3,
                name: "backend",
                slug: "backend",
                usageCount: 2
            }
        ];

        // 模拟文章数据
        const mockArticles = [
            {
                id: 1,
                title: "FastAPI后端开发最佳实践",
                excerpt: "本文介绍了使用FastAPI开发后端应用的最佳实践，包括路由设计、数据库集成、认证体系等方面。",
                author: { username: "admin" },
                category: "tech",
                tags: ["fastapi", "python", "backend"],
                created_at: "2023-01-15T10:30:00Z",
                view_count: 123,
                comment_count: 8
            },
            {
                id: 2,
                title: "Python异步编程入门",
                excerpt: "本文介绍了Python异步编程的基本概念和使用方法，包括async/await语法、asyncio库等。",
                author: { username: "testuser" },
                category: "tech",
                tags: ["python", "async"],
                created_at: "2023-03-20T14:20:00Z",
                view_count: 234,
                comment_count: 12
            },
            {
                id: 3,
                title: "FastAPI与SQLAlchemy集成",
                excerpt: "本文介绍了如何将FastAPI与SQLAlchemy ORM集成，实现数据库操作。",
                author: { username: "admin" },
                category: "tech",
                tags: ["fastapi", "python", "sqlalchemy"],
                created_at: "2023-04-10T09:15:00Z",
                view_count: 189,
                comment_count: 9
            }
        ];

        // 状态管理
        let tag = null;
        let articles = [];
        let loading = true;
        let error = null;

        // DOM元素
        const loadingElement = document.getElementById('loading');
        const errorStateElement = document.getElementById('errorState');
        const errorMessageElement = document.getElementById('errorMessage');
        const retryBtn = document.getElementById('retryBtn');
        const contentElement = document.getElementById('content');
        const tagNameElement = document.getElementById('tagName');
        const tagInfoElement = document.getElementById('tagInfo');
        const emptyStateElement = document.getElementById('emptyState');
        const articlesListElement = document.getElementById('articlesList');

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定事件监听器
            retryBtn.addEventListener('click', fetchData);
            
            // 获取标签slug并加载数据
            fetchData();
        });

        // 获取标签slug并加载数据
        function fetchData() {
            loading = true;
            error = null;
            updateUI();
            
            // 模拟从URL获取标签slug，这里使用默认值 "fastapi"
            const slug = "fastapi"; // 实际项目中可以从URL参数获取
            
            // 模拟API请求延迟
            setTimeout(() => {
                try {
                    // 模拟获取标签信息
                    tag = mockTags.find(t => t.slug === slug) || null;
                    
                    // 模拟获取相关文章
                    articles = mockArticles.filter(article => 
                        article.tags.includes(slug)
                    );
                } catch (err) {
                    console.error('Failed to fetch data:', err);
                    error = '加载失败';
                } finally {
                    loading = false;
                    updateUI();
                }
            }, 800);
        }

        // 更新UI
        function updateUI() {
            if (loading) {
                loadingElement.style.display = 'flex';
                errorStateElement.style.display = 'none';
                contentElement.style.display = 'none';
            } else if (error) {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'flex';
                errorMessageElement.textContent = error;
                contentElement.style.display = 'none';
            } else {
                loadingElement.style.display = 'none';
                errorStateElement.style.display = 'none';
                contentElement.style.display = 'block';
                
                // 更新标签信息
                if (tag) {
                    tagNameElement.textContent = `#${tag.name}`;
                    tagInfoElement.textContent = `${tag.usageCount} 篇相关文章`;
                } else {
                    tagNameElement.textContent = '#标签';
                    tagInfoElement.textContent = `${articles.length} 篇相关文章`;
                }
                
                // 更新文章列表
                if (articles.length === 0) {
                    emptyStateElement.style.display = 'flex';
                    articlesListElement.style.display = 'none';
                } else {
                    emptyStateElement.style.display = 'none';
                    articlesListElement.style.display = 'flex';
                    renderArticles();
                }
            }
        }

        // 渲染文章列表
        function renderArticles() {
            articlesListElement.innerHTML = '';
            
            articles.forEach(article => {
                const articleCard = document.createElement('div');
                articleCard.className = 'article-card';
                
                // 格式化日期
                const createdAt = new Date(article.created_at).toLocaleDateString('zh-CN');
                
                // 生成标签HTML
                const tagsHTML = article.tags.map(tag => 
                    `<a href="tag-articles.html?tag=${tag}" class="article-card-tag">${tag}</a>`
                ).join('');
                
                articleCard.innerHTML = `
                    <div class="article-card-header">
                        <h2 class="article-card-title">
                            <a href="article-detail.html?id=${article.id}">${article.title}</a>
                        </h2>
                        <div class="article-card-meta">
                            <span class="article-card-meta-item">
                                <span>👤</span>
                                <span>${article.author.username}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>📅</span>
                                <span>${createdAt}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>👁️</span>
                                <span>${article.view_count}</span>
                            </span>
                            <span class="article-card-meta-item">
                                <span>💬</span>
                                <span>${article.comment_count}</span>
                            </span>
                        </div>
                    </div>
                    <div class="article-card-excerpt">${article.excerpt}</div>
                    <div class="article-card-footer">
                        <div class="article-card-tags">${tagsHTML}</div>
                        <a href="article-detail.html?id=${article.id}" class="article-card-read-more">阅读更多 →</a>
                    </div>
                `;
                
                articlesListElement.appendChild(articleCard);
            });
        }
    </script>
</body>
</html>
