<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鐢ㄦ埛璧勬枡</title>
    <style>
        /* 鍩虹鏍峰紡 */
        :root {
            --color-primary: #00ff9d;
            --color-secondary: #00ccff;
            --color-accent: #ff6b6b;
            --color-text: #ffffff;
            --color-text-muted: #b0b0b0;
            --color-background: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-border: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
        }

        /* 椤甸潰瀹瑰櫒 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 鍔犺浇鐘舵€?*/
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: var(--color-text-muted);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 閿欒鐘舵€?*/
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
            color: #ff4444;
            text-align: center;
        }

        .error-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .retry-btn {
            margin-top: 16px;
            padding: 8px 24px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-btn:hover {
            background: #ff4444;
            color: white;
        }

        /* 鐢ㄦ埛鍗＄墖 */
        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 32px;
            background: var(--color-surface);
            border: 1px solid var(--color-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.1);
            border-radius: 8px;
            margin-bottom: 32px;
        }

        .user-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid var(--color-primary);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
        }

        .user-info h2 {
            margin: 0 0 4px;
            font-size: 1.5rem;
            color: var(--color-primary);
            text-shadow: 0 0 5px var(--color-primary);
        }

        .username {
            color: var(--color-text-muted);
            margin: 0 0 12px;
        }

        .bio {
            color: var(--color-text);
            line-height: 1.6;
            margin-bottom: 16px;
            max-width: 400px;
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat strong {
            color: var(--color-accent);
        }

        .role-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .role-badge.admin {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .role-badge.moderator {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
        }

        .role-badge.user {
            background: rgba(0, 255, 157, 0.2);
            color: var(--color-primary);
        }

        .user-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-follow,
        .btn-friend,
        .btn-following {
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            border: none;
        }

        .btn-follow {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
        }

        .btn-follow:hover:not(:disabled) {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 15px var(--color-primary);
        }

        .btn-following {
            background: rgba(0, 255, 157, 0.2);
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            cursor: default;
        }

        .btn-friend {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-text-muted);
            color: var(--color-text);
        }

        .btn-friend:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--color-text);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* 鐢ㄦ埛鏂囩珷 */
        .user-articles {
            margin-top: 32px;
        }

        .user-articles h2 {
            margin-bottom: 24px;
            color: var(--color-secondary);
            text-shadow: 0 0 5px var(--color-secondary);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: var(--color-text-muted);
            text-align: center;
            border: 1px dashed var(--color-border);
            border-radius: 8px;
        }

        .empty-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 鏂囩珷鍗＄墖 */
        .article-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .article-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.1);
        }

        .article-card h3 {
            margin-bottom: 8px;
            color: var(--color-primary);
        }

        .article-card .article-meta {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .article-card .article-excerpt {
            color: var(--color-text);
            margin-bottom: 16px;
        }

        .article-card .article-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .article-card .tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--color-primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="user-profile-page">
            <!-- 鍔犺浇鐘舵€?-->
            <div id="loading" class="loading" style="display: block;">
                <div class="loading-spinner"></div>
                <p>鍔犺浇鐢ㄦ埛璧勬枡涓?..</p>
            </div>
            
            <!-- 閿欒鐘舵€?-->
            <div id="error-state" class="error-state" style="display: none;">
                <span class="error-icon">鈿狅笍</span>
                <p id="error-message"></p>
                <button id="retry-btn" class="retry-btn">閲嶈瘯</button>
            </div>
            
            <!-- 鐢ㄦ埛璧勬枡 -->
            <div id="user-content" style="display: none;">
                <!-- 鐢ㄦ埛鍗＄墖 -->
                <div class="user-card">
                    <div class="user-avatar">
                        <div id="avatar-placeholder" class="avatar-placeholder"></div>
                    </div>
                    
                    <div class="user-info">
                        <h2 id="user-display-name"></h2>
                        <p id="user-username" class="username"></p>
                        <p id="user-bio" class="bio"></p>
                        
                        <div class="stats">
                            <span class="stat">
                                <strong id="user-contribution-count"></strong> 璐＄尞
                            </span>
                            <span id="user-role" class="stat role-badge"></span>
                        </div>
                    </div>
                    
                    <div id="user-actions" class="user-actions"></div>
                </div>
                
                <!-- 鐢ㄦ埛鏂囩珷 -->
                <section class="user-articles">
                    <h2 id="articles-title"></h2>
                    
                    <div id="empty-articles" class="empty-state" style="display: block;">
                        <span class="empty-icon">馃摑</span>
                        <p>鏆傛棤鏂囩珷</p>
                    </div>
                    
                    <div id="articles-list" class="articles-list" style="display: none;"></div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // 妯℃嫙鏁版嵁
        const mockUser = {
            id: 1,
            username: 'testuser',
            displayName: '娴嬭瘯鐢ㄦ埛',
            bio: '杩欐槸涓€涓祴璇曠敤鎴风殑绠€浠?,
            avatarUrl: null,
            contributionCount: 12,
            role: 'user',
            isFollowing: false
        };

        const mockArticles = [
            {
                id: 1,
                title: '娴嬭瘯鏂囩珷1',
                content: '杩欐槸娴嬭瘯鏂囩珷1鐨勫唴瀹?..',
                createdAt: '2024-01-01',
                updatedAt: '2024-01-01',
                author: 'testuser',
                tags: ['娴嬭瘯', '鏂囩珷']
            },
            {
                id: 2,
                title: '娴嬭瘯鏂囩珷2',
                content: '杩欐槸娴嬭瘯鏂囩珷2鐨勫唴瀹?..',
                createdAt: '2024-01-02',
                updatedAt: '2024-01-02',
                author: 'testuser',
                tags: ['娴嬭瘯']
            }
        ];

        // DOM 鍏冪礌
        const loadingEl = document.getElementById('loading');
        const errorStateEl = document.getElementById('error-state');
        const errorMessageEl = document.getElementById('error-message');
        const retryBtnEl = document.getElementById('retry-btn');
        const userContentEl = document.getElementById('user-content');
        const avatarPlaceholderEl = document.getElementById('avatar-placeholder');
        const userDisplayNameEl = document.getElementById('user-display-name');
        const userUsernameEl = document.getElementById('user-username');
        const userBioEl = document.getElementById('user-bio');
        const userContributionCountEl = document.getElementById('user-contribution-count');
        const userRoleEl = document.getElementById('user-role');
        const userActionsEl = document.getElementById('user-actions');
        const articlesTitleEl = document.getElementById('articles-title');
        const emptyArticlesEl = document.getElementById('empty-articles');
        const articlesListEl = document.getElementById('articles-list');

        // 鍔犺浇鐘舵€?        let loading = true;
        let error = null;
        let user = null;
        let articles = [];

        // 妯℃嫙API璋冪敤
        async function fetchUser() {
            loading = true;
            error = null;
            
            // 鏄剧ず鍔犺浇鐘舵€?            loadingEl.style.display = 'block';
            errorStateEl.style.display = 'none';
            userContentEl.style.display = 'none';
            
            try {
                // 妯℃嫙缃戠粶寤惰繜
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // 浣跨敤妯℃嫙鏁版嵁
                user = mockUser;
                articles = mockArticles;
                
                // 娓叉煋鐢ㄦ埛璧勬枡
                renderUserProfile();
                renderArticles();
                
                // 鏄剧ず鐢ㄦ埛鍐呭
                loadingEl.style.display = 'none';
                userContentEl.style.display = 'block';
            } catch (err) {
                error = '鍔犺浇鐢ㄦ埛璧勬枡澶辫触';
                console.error(err);
                
                // 鏄剧ず閿欒鐘舵€?                loadingEl.style.display = 'none';
                errorMessageEl.textContent = error;
                errorStateEl.style.display = 'block';
            } finally {
                loading = false;
            }
        }

        // 娓叉煋鐢ㄦ埛璧勬枡
        function renderUserProfile() {
            if (!user) return;
            
            // 璁剧疆澶村儚
            if (user.avatarUrl) {
                avatarPlaceholderEl.innerHTML = `<img src="${user.avatarUrl}" alt="${user.displayName || user.username}">`;
            } else {
                avatarPlaceholderEl.textContent = (user.displayName || user.username).charAt(0).toUpperCase();
            }
            
            // 璁剧疆鐢ㄦ埛淇℃伅
            userDisplayNameEl.textContent = user.displayName || user.username;
            userUsernameEl.textContent = `@${user.username}`;
            userBioEl.textContent = user.bio || '';
            userContributionCountEl.textContent = user.contributionCount;
            
            // 璁剧疆瑙掕壊
            if (user.role) {
                userRoleEl.textContent = user.role;
                userRoleEl.className = `stat role-badge ${user.role}`;
            } else {
                userRoleEl.style.display = 'none';
            }
            
            // 娓叉煋鐢ㄦ埛鎿嶄綔鎸夐挳
            renderUserActions();
        }

        // 娓叉煋鐢ㄦ埛鎿嶄綔鎸夐挳
        function renderUserActions() {
            if (!user) return;
            
            // 妯℃嫙褰撳墠鐢ㄦ埛宸茬櫥褰曚笖涓嶆槸鑷繁鐨勮祫鏂?            const isAuthenticated = true;
            const isOwnProfile = false;
            
            if (!isOwnProfile && isAuthenticated) {
                let actionButtons = '';
                
                if (!user.isFollowing) {
                    actionButtons += `
                        <button id="btn-follow" class="btn-follow">
                            <span>鍏虫敞</span>
                        </button>
                    `;
                } else {
                    actionButtons += `
                        <button id="btn-following" class="btn-following" disabled>
                            宸插叧娉?                        </button>
                    `;
                }
                
                actionButtons += `
                    <button id="btn-friend" class="btn-friend">
                        <span>娣诲姞濂藉弸</span>
                    </button>
                `;
                
                userActionsEl.innerHTML = actionButtons;
                
                // 娣诲姞浜嬩欢鐩戝惉鍣?                document.getElementById('btn-follow')?.addEventListener('click', () => handleConnect('follow'));
                document.getElementById('btn-friend')?.addEventListener('click', () => handleConnect('friend'));
            } else {
                userActionsEl.innerHTML = '';
            }
        }

        // 澶勭悊鍏虫敞/娣诲姞濂藉弸
        async function handleConnect(type) {
            const btn = type === 'follow' ? document.getElementById('btn-follow') : document.getElementById('btn-friend');
            if (!btn || btn.disabled) return;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="btn-spinner"></span>`;
            
            try {
                // 妯℃嫙API璋冪敤
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // 鏇存柊鐢ㄦ埛鐘舵€?                if (type === 'follow') {
                    user.isFollowing = true;
                    renderUserActions();
                    showToast('宸插叧娉?);
                } else {
                    showToast('宸插悜鐢ㄦ埛鍙戦€佸ソ鍙嬭姹?);
                }
            } catch (err) {
                console.error(err);
                showToast('鎿嶄綔澶辫触锛岃閲嶈瘯', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // 娓叉煋鏂囩珷鍒楄〃
        function renderArticles() {
            articlesTitleEl.textContent = `${user.displayName || user.username} 鐨勬枃绔燻;
            
            if (articles.length === 0) {
                emptyArticlesEl.style.display = 'block';
                articlesListEl.style.display = 'none';
            } else {
                emptyArticlesEl.style.display = 'none';
                articlesListEl.style.display = 'block';
                
                let articlesHtml = '';
                articles.forEach(article => {
                    articlesHtml += `
                        <div class="article-card">
                            <h3>${article.title}</h3>
                            <div class="article-meta">
                                ${article.createdAt} 鈥?${article.author}
                            </div>
                            <div class="article-excerpt">${article.content}</div>
                            <div class="article-tags">
                                ${article.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                });
                
                articlesListEl.innerHTML = articlesHtml;
            }
        }

        // 鏄剧ず鎻愮ず淇℃伅
        function showToast(message, type = 'success') {
            // 绠€鍗曠殑toast瀹炵幇
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 24px;
                background: ${type === 'success' ? 'rgba(0, 255, 157, 0.2)' : 'rgba(255, 68, 68, 0.2)'};
                color: ${type === 'success' ? '#00ff9d' : '#ff4444'};
                border: 1px solid ${type === 'success' ? '#00ff9d' : '#ff4444'};
                border-radius: 4px;
                z-index: 1000;
                transition: all 0.3s;
            `;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 鍒濆鍖?        document.addEventListener('DOMContentLoaded', () => {
            fetchUser();
            
            // 娣诲姞閲嶈瘯鎸夐挳浜嬩欢鐩戝惉鍣?            retryBtnEl.addEventListener('click', fetchUser);
        });
    </script>
</body>
</html>
